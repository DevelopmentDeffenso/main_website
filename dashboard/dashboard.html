<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>DEFFENSO — Admin Dashboard</title>
  <meta name="description" content="Deffenso Hackers Academy Admin Dashboard — Manage students, courses, batches, certifications, events, gallery, and notifications.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../assests/logos/logo.png" type="image/png">

  <!-- Fonts: Bebas Neue (headings) + Satoshi (body) + IBM Plex Mono (code/data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">

  <!-- Lucide Icons (lightweight SVG icon library) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Dashboard Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>
  <!-- Grain Overlay (matches index.html) -->
  <div class="grain-overlay"></div>

  <!-- App Shell -->
  <div class="dash-shell">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="../assests/logos/logo.png" alt="Deffenso" class="sidebar-logo">
        <span class="sidebar-brand">DEFFENSO</span>
        <span class="sidebar-role-badge">Admin</span>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-nav-item active" data-module="home" data-tooltip="Dashboard">
          <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="sidebar-nav-item" data-module="students" data-tooltip="Students">
          <span class="nav-icon"><i data-lucide="users"></i></span>
          <span class="nav-label">Students</span>
          <span class="sidebar-badge" id="badge-students" style="display:none">0</span>
        </button>
        <button class="sidebar-nav-item" data-module="courses" data-tooltip="Courses">
          <span class="nav-icon"><i data-lucide="book-open"></i></span>
          <span class="nav-label">Courses</span>
        </button>
        <button class="sidebar-nav-item" data-module="instructors" data-tooltip="Instructors">
          <span class="nav-icon"><i data-lucide="user-check"></i></span>
          <span class="nav-label">Instructors</span>
        </button>
        <button class="sidebar-nav-item" data-module="batches" data-tooltip="Batches">
          <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
          <span class="nav-label">Batches</span>
        </button>
        <button class="sidebar-nav-item" data-module="certifications" data-tooltip="Certifications">
          <span class="nav-icon"><i data-lucide="award"></i></span>
          <span class="nav-label">Certifications</span>
        </button>
        <button class="sidebar-nav-item" data-module="events" data-tooltip="Events">
          <span class="nav-icon"><i data-lucide="calendar"></i></span>
          <span class="nav-label">Events</span>
        </button>
        <button class="sidebar-nav-item" data-module="gallery" data-tooltip="Gallery">
          <span class="nav-icon"><i data-lucide="image"></i></span>
          <span class="nav-label">Gallery</span>
        </button>
        <button class="sidebar-nav-item" data-module="notifications" data-tooltip="Notifications">
          <span class="nav-icon"><i data-lucide="bell"></i></span>
          <span class="nav-label">Notifications</span>
        </button>
        <button class="sidebar-nav-item" data-module="analytics" data-tooltip="Analytics">
          <span class="nav-icon"><i data-lucide="bar-chart-3"></i></span>
          <span class="nav-label">Analytics</span>
        </button>
        <button class="sidebar-nav-item" data-module="settings" data-tooltip="Settings">
          <span class="nav-icon"><i data-lucide="settings"></i></span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">SA</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Super Admin</div>
            <div class="sidebar-user-role">super_admin</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ═══ TOPBAR ═══ -->
    <header class="topbar">
      <button class="topbar-hamburger" id="topbar-hamburger" aria-label="Toggle sidebar">
        <i data-lucide="menu"></i>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <span class="topbar-breadcrumb">/ Home</span>
      <div class="topbar-right">
        <span class="topbar-clock" id="topbar-clock">--:--:-- IST</span>
        <button class="topbar-notif-btn" aria-label="Notifications" onclick="navigateTo('notifications')">
          <i data-lucide="bell"></i>
          <span class="topbar-notif-dot"></span>
        </button>
      </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-content" id="main-content">
      <!-- Content injected by JS based on active module -->
    </main>

  </div>

  <!-- ═══ ADD STUDENT MODAL ═══ -->
  <div class="modal-overlay" id="add-student-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add New Student</span>
        <button class="modal-close" onclick="closeModal('add-student-modal')">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="new-student-name" placeholder="Enter full name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="new-student-email" placeholder="Email address" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-input" id="new-student-phone" placeholder="+91-XXXXXXXXXX">
          </div>
          <div class="form-group">
            <label class="form-label">Course</label>
            <select class="form-input" id="new-student-course">
              <option value="">Select Course</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Batch</label>
          <select class="form-input" id="new-student-batch">
            <option value="">Select Batch</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-b" onclick="closeModal('add-student-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="addNewStudent()">Add Student</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Dashboard JS -->
  <script src="js/app.js"></script>
  <script>
    // Initialize Lucide icons after DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    /* ── Add Student handler ── */
    function addNewStudent() {
      const name   = document.getElementById('new-student-name').value.trim();
      const email  = document.getElementById('new-student-email').value.trim();
      const phone  = document.getElementById('new-student-phone').value.trim();
      const course = document.getElementById('new-student-course').value;
      const batch  = document.getElementById('new-student-batch').value;

      // Inline validation
      if (!name)   { showToast('Student name is required', 'error'); return; }
      if (!email || !email.includes('@')) { showToast('Valid email is required', 'error'); return; }
      if (!course) { showToast('Please select a course', 'error'); return; }

      const newId = 'STU-' + String(STORE.students.length + 1).padStart(3, '0');
      STORE.students.push({
        id: newId, name, email, phone,
        course, batch: batch || 'Unassigned',
        status: 'active',
        enrollment_date: new Date().toISOString().slice(0,10),
        last_active: new Date().toISOString().slice(0,10),
        attendance_pct: 0
      });

      closeModal('add-student-modal');
      showToast(`${name} enrolled successfully`, 'success');

      // Clear form
      ['new-student-name','new-student-email','new-student-phone'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('new-student-course').selectedIndex = 0;
      document.getElementById('new-student-batch').selectedIndex = 0;

      // Refresh if on students page
      if (currentModule === 'students') {
        navigateTo('students');
      }
      updateBadgeCounts();
    }
  </script>
</body>
</html>
