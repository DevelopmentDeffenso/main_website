  <style>
    /* ═══════════════════════════════════════════════════════
       § 1. DESIGN TOKENS
    ═══════════════════════════════════════════════════════ */
    :root {
      --void: #030303;
      --void-1: #0A0A0A;
      --void-2: #111111;
      --void-3: #1A1A1A;
      --cream: #E2D9C8;
      --cream-2: #A89E8D;
      --cream-3: #5A5249;
      --blue: #007BFF;
      --blue-hi: #3DA5FF;
      --blue-dim: rgba(0, 123, 255, 0.12);
      --green: #00FF41;
      --wire: #1E1E1E;
      --wire-2: #2A2A2A;
      --font-d: 'Bebas Neue', sans-serif;
      --font-m: 'IBM Plex Mono', monospace;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --space-xl: 64px;
      --px: 20px;
    }

    /* ═══════════════════════════════════════════════════════
       § 2. RESET & BASE
    ═══════════════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--void);
      color: var(--cream);
      font-family: var(--font-m);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 0px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      font-family: inherit;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ul {
      list-style: none;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 2px;
    }

    ::-webkit-scrollbar-track {
      background: var(--void);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--blue);
    }

    /* ═══════════════════════════════════════════════════════
       § 3. GLOBAL KEYFRAMES
    ═══════════════════════════════════════════════════════ */
    @keyframes pulseDot {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }



    @keyframes grainShift {

      0%,
      100% {
        transform: translate(0, 0)
      }

      10% {
        transform: translate(-2%, -3%)
      }

      30% {
        transform: translate(3%, 2%)
      }

      50% {
        transform: translate(-1%, 4%)
      }

      70% {
        transform: translate(2%, -2%)
      }

      90% {
        transform: translate(-3%, 1%)
      }
    }

    @keyframes uscore {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    @keyframes stripScroll {
      0% {
        transform: translateX(0)
      }

      100% {
        transform: translateX(-50%)
      }
    }

    @keyframes hexScroll {
      0% {
        transform: translateX(0)
      }

      100% {
        transform: translateX(-50%)
      }
    }



    @keyframes pIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes decode {
      0% {
        opacity: .3;
        filter: blur(3px)
      }

      100% {
        opacity: 1;
        filter: none
      }
    }



    @keyframes scanDown {
      0% {
        top: -2px;
        opacity: 0
      }

      4% {
        opacity: 1
      }

      96% {
        opacity: .7
      }

      100% {
        top: 100%;
        opacity: 0
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    @keyframes flowBdr {
      0% {
        background-position: 0% 0%
      }

      100% {
        background-position: 200% 0%
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes cornerBlink {

      0%,
      100% {
        opacity: .35
      }

      50% {
        opacity: 1
      }
    }

    @keyframes typing {
      from {
        max-width: 0
      }

      to {
        max-width: 280px
      }
    }

    @keyframes cursorBlink {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    @keyframes glitchTitle {

      0%,
      86%,
      100% {
        transform: none;
        filter: none
      }

      87% {
        transform: translateX(-4px) skewX(-3deg);
        filter: drop-shadow(5px 0 0 rgba(0, 123, 255, .9)) drop-shadow(-5px 0 0 rgba(0, 255, 65, .4))
      }

      88% {
        transform: translateX(4px) skewX(1deg);
        filter: drop-shadow(-4px 0 0 rgba(0, 123, 255, .8))
      }

      89% {
        transform: none;
        filter: none
      }

      91% {
        transform: translateX(-2px);
        filter: drop-shadow(3px 0 0 rgba(0, 123, 255, .5))
      }

      92% {
        transform: none;
        filter: none
      }
    }

    @keyframes glitchBecome {

      0%,
      94%,
      100% {
        transform: none;
        opacity: 1
      }

      95% {
        transform: translateX(3px);
        opacity: .9
      }

      96% {
        transform: translateX(-2px);
        opacity: 1
      }

      97% {
        transform: none
      }
    }

    @keyframes statusPulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px var(--green)
      }

      50% {
        opacity: .3;
        box-shadow: none
      }
    }

    @keyframes flickerHero {

      0%,
      89%,
      91%,
      96%,
      100% {
        opacity: 1
      }

      90% {
        opacity: .94
      }

      97% {
        opacity: .97
      }
    }

    @keyframes cardGlitch {

      0%,
      90%,
      100% {
        transform: none;
        filter: none
      }

      91% {
        transform: translateX(-2px) skewX(-1deg);
        filter: drop-shadow(3px 0 0 rgba(0, 123, 255, .8)) drop-shadow(-2px 0 0 rgba(0, 255, 65, .3))
      }

      93% {
        transform: translateX(2px);
        filter: none
      }

      94% {
        transform: none
      }
    }

    @keyframes scanCount {
      from {
        opacity: .3;
        filter: blur(2px)
      }

      to {
        opacity: 1;
        filter: none
      }
    }

    /* Gallery lightbox fade */
    @keyframes lightboxIn {
      from {
        opacity: 0;
        transform: scale(.96)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }



    /* ═══════════════════════════════════════════════════════
       § 4. GLOBAL UTILITIES
    ═══════════════════════════════════════════════════════ */
    .px {
      padding-left: var(--px);
      padding-right: var(--px);
    }

    .max-w {
      max-width: 1440px;
      margin: 0 auto;
    }

    .grain-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: .028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      animation: grainShift .4s steps(1) infinite;
    }

    .hex-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .04;
      background-image: linear-gradient(rgba(0, 123, 255, .6) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, .6) 1px, transparent 1px), linear-gradient(rgba(0, 123, 255, .2) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, .2) 1px, transparent 1px);
      background-size: 60px 60px, 60px 60px, 12px 12px, 12px 12px;
    }

    .u-cursor::after {
      content: '_';
      color: var(--blue);
      font-weight: 700;
      animation: uscore .8s infinite;
    }

    .shdr-blink {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--blue);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulseDot 1.4s ease-in-out infinite;
    }

    .decode-reveal {
      opacity: 0;
    }

    .decode-reveal.visible {
      animation: decode .6s ease forwards;
    }

    #app>* {
      animation: pIn .28s ease both;
    }

    body.menu-open {
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════
       § 5. SECTION HEADER BAR
    ═══════════════════════════════════════════════════════ */
    .section-hdr {
      display: flex;
      align-items: center;
      height: 40px;
      gap: 10px;
      padding: 0 var(--px);
      background: var(--void-1);
      border-top: 1px solid var(--wire);
      border-bottom: 1px solid var(--wire);
      overflow: hidden;
    }

    @media(min-width:640px) {
      .section-hdr {
        height: 44px;
      }
    }

    .shdr-id {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--blue);
      padding-right: 10px;
      border-right: 1px solid var(--wire);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .shdr-title {
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cream-3);
      white-space: nowrap;
    }

    .shdr-right {
      margin-left: auto;
      font-size: 8.5px;
      letter-spacing: .12em;
      color: var(--cream-3);
      white-space: nowrap;
      display: none;
    }

    @media(min-width:640px) {
      .shdr-title {
        font-size: 9px;
      }

      .shdr-right {
        display: block;
        font-size: 9px;
      }
    }

    .shdr-clock {
      margin-left: auto;
      font-size: 9px;
      letter-spacing: .1em;
      color: var(--cream-3);
      white-space: nowrap;
      font-family: var(--font-m);
    }

    /* ═══════════════════════════════════════════════════════
       § 6. CLASSIFICATION BANNER
    ═══════════════════════════════════════════════════════ */




    /* ═══════════════════════════════════════════════════════
       § 7. TOP NAVBAR
    ═══════════════════════════════════════════════════════ */
    .navbar-wrapper {
      position: relative;
      z-index: 100;
      border-bottom: 1px solid var(--wire);
      background: var(--void);
    }

    @media(min-width:640px) {
      .navbar-wrapper {
        top: 0;
      }
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      height: 52px;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 4px 0 0;
    }

    @media(min-width:640px) {
      .navbar {
        height: 60px;
      }
    }

    .nav-logo {
      display: flex;
      align-items: center;
      padding: 0px;
      gap: 10px;
      border-right: 1px solid var(--wire);
      min-width: 75px;
      cursor: pointer;
    }

    .nav-logo img {
      height: 38px;
      width: auto;
      object-fit: contain;
    }

    .nav-logo-fallback {
      font-family: var(--font-d);
      font-size: 18px;
      letter-spacing: .06em;
      display: none;
    }

    @media(min-width:640px) {
      .nav-logo {
        padding: 0 24px;
      }

      .nav-logo img {
        height: 50px;
      }
    }

    .nav-links {
      display: none;
    }

    @media(min-width:1024px) {
      .nav-links {
        display: flex;
        align-items: stretch;
      }
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cream-3);
      border-right: 1px solid var(--wire);
      transition: color .18s, background .18s;
      background: none;
      border: none;
      cursor: pointer;
    }

    .nav-link:hover {
      color: var(--cream);
      background: rgba(255, 255, 255, .03);
    }

    /* ── Events nav button (blue gradient) ── */
    .btn-nav-events {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      border-right: 1px solid rgba(255, 255, 255, .12);
      border-top: none;
      border-bottom: none;
      border-left: none;
      cursor: pointer;
      transition: filter .18s;
      background: linear-gradient(90deg, #0066CC, #007BFF, #3DA5FF, #007BFF, #0066CC);
      background-size: 200% auto;
      color: #fff;
      animation: gradientSlide 3s linear infinite;
    }

    @keyframes gradientSlide {
      0% {
        background-position: 0%
      }

      100% {
        background-position: 200%
      }
    }

    .btn-nav-events:hover {
      filter: brightness(1.15);
    }


    .nav-right {
      display: flex;
      align-items: stretch;
      margin-left: auto;
    }

    .nav-status {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 18px;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-3);
      border-left: 1px solid var(--wire);
    }

    @media(min-width:1200px) {
      .nav-status {
        display: flex;
      }
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      animation: pulseDot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .btn-nav-enroll {
      display: none;
      padding: 0 24px;
      background: linear-gradient(90deg, #0066CC, #007BFF, #3DA5FF, #007BFF, #0066CC);
      background-size: 200% auto;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: none;
      align-items: center;
      border-left: 1px solid rgba(255, 255, 255, .08);
      transition: filter .18s;
      white-space: nowrap;
      cursor: pointer;
      animation: gradientSlide 3s linear infinite;
    }

    .btn-nav-enroll:hover {
      filter: brightness(1.2);
    }

    @media(min-width:640px) {
      .btn-nav-enroll {
        display: flex;
      }
    }

    .mob-hamburger {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      color: var(--cream);
      border-left: 1px solid var(--wire);
      flex-shrink: 0;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .mob-hamburger svg {
      transition: transform .22s;
    }

    .mob-hamburger.open svg {
      transform: rotate(45deg);
    }

    @media(min-width:1024px) {
      .mob-hamburger {
        display: none;
      }
    }

    /* ═══════════════════════════════════════════════════════
       § 8. MOBILE FULL-SCREEN MENU
    ═══════════════════════════════════════════════════════ */
    .mob-menu {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      height: calc(100vh - 52px - var(--safe-bottom));
      background: var(--void);
      z-index: 99;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.22, .61, .36, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      border-top: 2px solid var(--blue);
    }

    .mob-menu.open {
      transform: translateX(0);
    }

    @media(min-width:640px) {
      .mob-menu {
        top: 52px;
      }
    }

    .mob-menu-body {
      flex: 1;
      padding: 24px;
    }

    .mob-nav-item {
      display: flex;
      align-items: center;
      min-height: 56px;
      padding: 0 4px;
      border-bottom: 1px solid var(--wire);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-2);
      transition: color .15s;
      width: 100%;
      justify-content: space-between;
      cursor: pointer;
    }

    .mob-nav-item:active {
      color: var(--cream);
    }

    .mob-programs-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
    }

    .mob-programs-panel.open {
      max-height: 600px;
    }

    .mob-program-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 16px;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-3);
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      transition: color .15s;
      cursor: pointer;
    }

    .mob-program-link::before {
      content: '//';
      color: var(--blue);
      font-size: 9px;
    }

    .mob-program-link:active {
      color: var(--cream);
    }

    /* Mobile events link (gradient badge) */
    .mob-events-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 56px;
      padding: 0 4px;
      border-bottom: 1px solid var(--wire);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      width: 100%;
      justify-content: space-between;
      cursor: pointer;
      background: none;
      color: var(--blue);
    }

    .mob-menu-footer {
      padding: 24px;
      padding-bottom: calc(24px + var(--safe-bottom));
      border-top: 1px solid var(--wire);
      background: var(--void-1);
    }

    .mob-enroll-btn {
      width: 100%;
      min-height: 52px;
      background: linear-gradient(90deg, #0066CC, #007BFF, #3DA5FF, #007BFF, #0066CC);
      background-size: 200% auto;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: none;
      transition: filter .18s;
      cursor: pointer;
      animation: gradientSlide 3s linear infinite;
    }

    .mob-enroll-btn:active {
      filter: brightness(1.2);
    }

    .mob-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
    }



    /* ═══════════════════════════════════════════════════════
       § 10. HERO SECTION
    ═══════════════════════════════════════════════════════ */
    .hero {
      position: relative;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 32px;
      padding-bottom: 52px;
      overflow: hidden;
      background: #000;
      animation: flickerHero 14s ease-in-out infinite;
    }

    @media(min-width:640px) {
      .hero {
        padding-top: 48px;
      }
    }

    #hero-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: .85;
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 46%, rgba(3, 3, 3, .1) 0%, rgba(3, 3, 3, .42) 55%, rgba(3, 3, 3, .85) 100%), linear-gradient(to bottom, rgba(3, 3, 3, .7) 0%, rgba(3, 3, 3, .05) 14%, rgba(3, 3, 3, .05) 76%, rgba(3, 3, 3, .88) 100%);
    }

    .hero-scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 123, 255, .08) 12%, rgba(0, 123, 255, .55) 38%, rgba(45, 143, 255, .95) 50%, rgba(0, 123, 255, .55) 62%, rgba(0, 123, 255, .08) 88%, transparent 100%);
      box-shadow: 0 0 10px rgba(0, 123, 255, .45), 0 0 24px rgba(0, 123, 255, .15);
      animation: scanDown 5.5s linear infinite;
    }

    .hcorner {
      position: absolute;
      z-index: 8;
      width: 28px;
      height: 28px;
      animation: cornerBlink 2.8s ease-in-out infinite;
      border-radius: 0;
    }

    .hcorner.tl {
      top: 60px;
      left: 14px;
      border-top: 2px solid var(--blue);
      border-left: 2px solid var(--blue);
    }

    .hcorner.tr {
      top: 60px;
      right: 14px;
      border-top: 2px solid var(--blue);
      border-right: 2px solid var(--blue);
      animation-delay: .5s;
    }

    .hcorner.bl {
      bottom: 74px;
      left: 14px;
      border-bottom: 2px solid var(--blue);
      border-left: 2px solid var(--blue);
      animation-delay: 1s;
    }

    .hcorner.br {
      bottom: 74px;
      right: 14px;
      border-bottom: 2px solid var(--blue);
      border-right: 2px solid var(--blue);
      animation-delay: 1.5s;
    }

    .hero-content {
      position: relative;
      z-index: 5;
      width: 100%;
      padding: 0 20px;
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-terminal {
      display: flex;
      align-items: center;
      font-size: 10px;
      font-family: var(--font-m);
      color: var(--cream-3);
      margin-bottom: 22px;
      padding: 8px 12px;
      border: 1px solid rgba(0, 123, 255, .22);
      background: rgba(0, 123, 255, .04);
      width: fit-content;
      max-width: 100%;
      overflow: hidden;
    }

    .ht-prompt {
      color: var(--blue);
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      margin-right: 6px;
    }

    .ht-cmd {
      color: var(--cream-2);
      white-space: nowrap;
      display: inline-block;
      overflow: hidden;
      max-width: 0;
      animation: typing 2.2s steps(32) .4s forwards;
    }

    .ht-cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--blue);
      flex-shrink: 0;
      margin-left: 2px;
      vertical-align: middle;
      animation: cursorBlink .75s infinite 2.6s;
    }

    .ht-become {
      display: block;
      font-family: var(--font-d);
      font-size: clamp(56px, 15.5vw, 200px);
      line-height: .88;
      letter-spacing: .025em;
      color: var(--cream);
      text-shadow: 0 0 80px rgba(0, 123, 255, .18), 0 2px 20px rgba(0, 0, 0, .8);
      animation: glitchBecome 11s infinite 3.5s;
    }

    .ht-unstop {
      display: block;
      font-family: var(--font-d);
      font-size: clamp(38px, 11.2vw, 175px);
      line-height: .9;
      letter-spacing: .025em;
      color: transparent;
      -webkit-text-stroke: 0.1px rgba(226, 217, 200, .28);
      white-space: nowrap;
      animation: glitchTitle 10s infinite 2s;
    }

    @media(min-width:768px) {
      .ht-become {
        font-size: clamp(90px, 13vw, 200px);
      }

      .ht-unstop {
        font-size: clamp(72px, 11.5vw, 175px);
      }
    }

    .hero-divider {
      width: 90%;
      max-width: 480px;
      height: 1px;
      margin: 18px 0;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 123, 255, .5) 28%, rgba(0, 123, 255, .5) 72%, transparent 100%);
    }

    .hero-live-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
      margin-bottom: 16px;
    }

    .hls-dot {
      width: 5px;
      height: 5px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--green);
      animation: statusPulse 1.6s ease-in-out infinite;
    }

    .hls-sep {
      color: rgba(255, 255, 255, .15);
    }

    .hero-desc {
      font-size: 12.5px;
      line-height: 1.78;
      color: var(--cream-2);
      max-width: 400px;
      margin-bottom: 24px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
      align-items: stretch;
    }

    @media(min-width:480px) {
      .hero-actions {
        flex-direction: row;
        gap: 0;
        max-width: none;
        justify-content: center;
        align-items: center;
      }
    }

    .hero-bottom-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 6;
      height: 44px;
      background: rgba(3, 3, 3, .92);
      border-top: 1px solid var(--wire);
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .hero-strip-track {
      display: flex;
      align-items: center;
      height: 100%;
      white-space: nowrap;
      animation: stripScroll 24s linear infinite;
    }

    .hstrip-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      height: 100%;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
      border-right: 1px solid var(--wire);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hstrip-item .sv {
      color: var(--cream);
    }

    .hstrip-item.al .sv {
      color: var(--blue);
    }

    .hstrip-divider {
      width: 3px;
      height: 3px;
      background: var(--blue);
      flex-shrink: 0;
      margin: 0 4px;
    }

    /* ═══════════════════════════════════════════════════════
       § 11. BUTTONS
    ═══════════════════════════════════════════════════════ */
    .btn-red {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 28px;
      background: var(--blue);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: none;
      transition: background .18s;
      width: 100%;
      cursor: pointer;
    }

    @media(min-width:480px) {
      .btn-red {
        width: auto;
      }
    }

    .btn-red:active,
    .btn-red:hover {
      background: var(--blue-hi);
    }

    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 28px;
      background: transparent;
      color: var(--cream-2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: 1px solid var(--wire-2);
      transition: all .18s;
      width: 100%;
      cursor: pointer;
    }

    @media(min-width:480px) {
      .btn-outline {
        width: auto;
      }
    }

    .btn-outline:active,
    .btn-outline:hover {
      border-color: var(--blue);
      color: var(--cream);
    }

    /* ═══════════════════════════════════════════════════════
       § 12. STATS SECTION
    ═══════════════════════════════════════════════════════ */
    .stats-bar {
      background: var(--void-1);
      border-bottom: 2px solid var(--wire);
      position: relative;
      overflow: hidden;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
    }

    @media(min-width:640px) {
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .stat-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px var(--px);
      border-bottom: 1px solid var(--wire);
    }

    @media(min-width:640px) {
      .stat-cell {
        border-bottom: none;
        border-right: 1px solid var(--wire);
        padding: 40px;
      }

      .stat-cell:last-child {
        border-right: none;
      }
    }

    .stat-cell-label-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cream-3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 1px;
      background: var(--blue);
    }

    .stat-num {
      font-family: var(--font-d);
      font-size: clamp(52px, 12vw, 80px);
      line-height: 1;
      letter-spacing: .02em;
      color: var(--cream);
      margin-bottom: 6px;
    }

    .stat-num.danger {
      color: var(--blue);
    }

    .stat-sub {
      font-size: 11px;
      color: var(--cream-3);
    }

    .stat-ping {
      font-size: 8px;
      font-family: var(--font-m);
      letter-spacing: .12em;
      color: var(--blue);
      padding: 1px 5px;
      border: 1px solid rgba(0, 123, 255, .3);
      flex-shrink: 0;
    }

    .stat-ascii {
      font-family: var(--font-m);
      font-size: 8px;
      color: rgba(0, 123, 255, .2);
      line-height: 1.2;
      margin-top: 8px;
      white-space: pre;
      display: none;
    }

    @media(min-width:640px) {
      .stat-ascii {
        display: block;
      }
    }

    .stat-num.scanning {
      animation: scanCount .12s steps(1) infinite;
      color: var(--blue) !important;
    }



    /* ═══════════════════════════════════════════════════════
       § 14. PROGRAMS GRID
    ═══════════════════════════════════════════════════════ */
    .programs-section {
      padding: var(--space-xl) 0;
    }

    .programs-inner {
      max-width: 1440px;
      margin: 0 auto;
    }

    .programs-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scroll-padding: 0 var(--px);
      display: flex;
      gap: 1px;
      padding: 0 var(--px);
      margin-top: 36px;
      scrollbar-width: none;
    }

    .programs-scroll-wrap::-webkit-scrollbar {
      display: none;
    }

    .programs-scroll-wrap .program-card {
      min-width: 280px;
      max-width: 340px;
      scroll-snap-align: start;
      flex-shrink: 0;
    }

    .scroll-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      padding: 0 var(--px);
    }

    .scroll-dot {
      width: 4px;
      height: 4px;
      background: var(--wire-2);
      transition: background .2s;
    }

    .scroll-dot.active {
      background: var(--blue);
      width: 16px;
    }

    @media(min-width:640px) {
      .scroll-hint {
        display: none;
      }

      .programs-scroll-wrap {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
        overflow-x: visible;
        padding: 0 var(--px);
        scroll-snap-type: none;
        margin-top: 40px;
      }

      .programs-scroll-wrap .program-card {
        min-width: 0;
        max-width: none;
      }
    }

    @media(min-width:1024px) {
      .programs-scroll-wrap {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .program-card {
      background: var(--void);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--wire);
      transition: background .2s;
      animation: none;
    }

    @media(min-width:640px) {
      .program-card {
        padding: 32px 28px;
        border: none;
      }
    }

    .program-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-clr, var(--blue));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s ease;
    }

    @media(hover:hover) {
      .program-card:hover {
        background: var(--void-1);
        animation: cardGlitch 3s ease .3s;
      }

      .program-card:hover::after {
        transform: scaleX(1);
      }
    }

    .program-card:active {
      background: var(--void-1);
    }

    .prog-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      color: var(--cream-3);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prog-num span {
      color: var(--card-clr, var(--blue));
    }

    .prog-level {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--card-clr, var(--blue));
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--card-clr, var(--blue));
    }

    .prog-title-wrap {
      margin: 14px 0;
    }

    .prog-name {
      font-family: var(--font-d);
      font-size: clamp(28px, 6vw, 40px);
      line-height: .95;
      letter-spacing: .02em;
      color: var(--cream);
    }

    .prog-sub {
      color: var(--card-clr, var(--blue));
    }

    .prog-desc {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.65;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .prog-modules {
      margin-bottom: 20px;
    }

    .prog-mod-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--wire);
      font-size: 11px;
      color: var(--cream-3);
    }

    .prog-mod-item:last-child {
      border-bottom: none;
    }

    .prog-mod-item::before {
      content: '//';
      color: var(--card-clr, var(--blue));
      font-size: 9px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .prog-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid var(--wire);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
      width: 100%;
      transition: color .18s, background .18s;
      min-height: 44px;
      cursor: pointer;
      background: none;
      border-left: none;
      border-right: none;
      border-bottom: none;
      font-family: var(--font-m);
    }

    .prog-action svg {
      transition: transform .2s;
    }

    .prog-action.brochure-ready {
      color: var(--blue);
    }

    .prog-action.brochure-dummy {
      color: var(--cream-3);
      opacity: .5;
      cursor: default;
    }

    @media(hover:hover) {
      .prog-action.brochure-ready:hover {
        color: #fff;
        background: rgba(0, 123, 255, .15);
      }

      .prog-action.brochure-ready:hover svg {
        transform: translateY(-2px);
      }
    }

    .card-cmd {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, .55);
      border-left: 2px solid var(--card-clr, var(--blue));
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--cream-3);
      overflow: hidden;
    }

    .card-cmd .cp {
      color: var(--card-clr, var(--blue));
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-cmd .cc {
      color: rgba(0, 123, 255, .8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ═══════════════════════════════════════════════════════
       § 15. HEX STRIP
    ═══════════════════════════════════════════════════════ */
    .hex-strip {
      width: 100%;
      overflow: hidden;
      background: var(--void-1);
      border-top: 1px solid var(--wire);
      border-bottom: 1px solid var(--wire);
      padding: 7px 0;
      position: relative;
    }

    .hex-strip::before,
    .hex-strip::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 2;
      pointer-events: none;
    }

    .hex-strip::before {
      left: 0;
      background: linear-gradient(to right, var(--void-1), transparent);
    }

    .hex-strip::after {
      right: 0;
      background: linear-gradient(to left, var(--void-1), transparent);
    }

    .hex-track {
      display: flex;
      width: max-content;
      animation: hexScroll 28s linear infinite;
    }

    .hex-byte {
      font-family: var(--font-m);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 0 10px;
      color: rgba(0, 123, 255, .28);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hex-byte.hi {
      color: rgba(0, 123, 255, .65);
    }

    .hex-byte.sep {
      color: rgba(255, 255, 255, .08);
      padding: 0 4px;
    }

    /* ═══════════════════════════════════════════════════════
       § 16. WHY SECTION
    ═══════════════════════════════════════════════════════ */
    .why-section {
      padding: var(--space-xl) 0;
      background: var(--void-1);
      border-bottom: 1px solid var(--wire);
    }

    .why-inner {
      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;
    }

    .why-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .why-h {
      font-family: var(--font-d);
      font-size: clamp(44px, 10vw, 80px);
      line-height: .92;
      letter-spacing: .02em;
      margin-top: 8px;
      margin-bottom: 48px;
    }

    .why-h span {
      color: var(--blue);
    }

    .why-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--wire);
    }

    @media(min-width:540px) {
      .why-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(min-width:1024px) {
      .why-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .why-card {
      background: var(--void-1);
      padding: 28px 24px;
      position: relative;
      transition: background .2s;
    }

    .why-card:active,
    .why-card:hover {
      background: rgba(0, 123, 255, .04);
    }

    .why-card-icon {
      width: 44px;
      height: 44px;
      border: 1px solid var(--wire-2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      color: var(--blue);
      flex-shrink: 0;
    }

    .why-card-num {
      position: absolute;
      top: 24px;
      right: 24px;
      font-family: var(--font-d);
      font-size: 32px;
      color: rgba(0, 123, 255, .12);
      line-height: 1;
      pointer-events: none;
    }

    .why-card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .why-card-text {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.7;
    }

    .why-card-tag {
      display: inline-block;
      margin-top: 14px;
      padding: 3px 8px;
      border: 1px solid rgba(0, 123, 255, .3);
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .why-cta-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--wire);
    }

    .why-cta-text {
      font-size: 12px;
      color: var(--cream-3);
      max-width: 380px;
      line-height: 1.65;
    }

    .why-cta-text strong {
      color: var(--cream);
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════════════════
       § 17. GALLERY SECTION
    ═══════════════════════════════════════════════════════ */
    .gallery-section {
      padding: var(--space-xl) 0;
      background: var(--void);
    }

    .gallery-inner {
      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;
    }

    .gallery-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .gallery-h {
      font-family: var(--font-d);
      font-size: clamp(44px, 10vw, 80px);
      line-height: .92;
      letter-spacing: .02em;
      margin-top: 8px;
      margin-bottom: 14px;
    }

    .gallery-sub {
      font-size: 13px;
      color: var(--cream-3);
      margin-bottom: 40px;
      max-width: 480px;
      line-height: 1.65;
    }

    /* Masonry-style grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }

    @media(min-width:768px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      background: var(--void-1);
      border: 1px solid var(--wire);
      cursor: pointer;
      aspect-ratio: 4/3;
      transition: border-color .2s;
    }

    .gallery-item:hover {
      border-color: var(--blue);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .45s ease, filter .45s ease;
      filter: grayscale(30%) brightness(.85);
    }

    .gallery-item:hover img {
      transform: scale(1.06);
      filter: grayscale(0%) brightness(1);
    }

    /* Overlay */
    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(3, 3, 3, .85) 0%, transparent 55%);
      opacity: 0;
      transition: opacity .3s;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
    }

    .gallery-item-caption {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream);
      font-family: var(--font-m);
    }

    .gallery-item-tag {
      display: inline-block;
      margin-bottom: 5px;
      padding: 2px 7px;
      background: var(--blue);
      color: #fff;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    /* Corner bracket decoration */
    .gallery-item::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      width: 14px;
      height: 14px;
      border-top: 1.5px solid var(--blue);
      border-left: 1.5px solid var(--blue);
      z-index: 2;
      opacity: 0;
      transition: opacity .3s;
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 14px;
      height: 14px;
      border-bottom: 1.5px solid var(--blue);
      border-right: 1.5px solid var(--blue);
      z-index: 2;
      opacity: 0;
      transition: opacity .3s;
    }

    .gallery-item:hover::before,
    .gallery-item:hover::after {
      opacity: 1;
    }



    /* Lightbox */
    .gallery-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, .94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      transition: opacity .2s, visibility .2s;
    }

    .gallery-lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    .gallery-lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      animation: lightboxIn .25s ease;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border: 1px solid var(--wire-2);
      background: rgba(3, 3, 3, .9);
      color: var(--cream-2);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .18s;
    }

    .lightbox-close:hover {
      border-color: var(--blue);
      color: var(--cream);
    }

    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
      white-space: nowrap;
    }

    /* Gallery filter tabs */
    .gallery-filters {
      display: flex;
      align-items: center;
      gap: 1px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .gallery-filter-btn {
      padding: 8px 16px;
      min-height: 36px;
      font-family: var(--font-m);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      border: 1px solid var(--wire);
      color: var(--cream-3);
      background: transparent;
      cursor: pointer;
      transition: all .18s;
    }

    .gallery-filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .gallery-filter-btn:hover:not(.active) {
      border-color: var(--blue);
      color: var(--cream);
    }

    /* ═══════════════════════════════════════════════════════
       § 18. NEWSLETTER SECTION
    ═══════════════════════════════════════════════════════ */
    .newsletter-section {
      padding: var(--space-xl) 0;
      background: var(--void-1);
      border-top: 1px solid var(--wire);
      position: relative;
      overflow: hidden;
    }

    .newsletter-section::before {
      content: 'INTEL';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-family: var(--font-d);
      font-size: 120px;
      letter-spacing: .06em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 123, 255, .05);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .newsletter-inner {
      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 44px;
    }

    @media(min-width:900px) {
      .newsletter-inner {
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: center;
      }
    }

    .newsletter-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .newsletter-eyebrow::before {
      content: '//';
      opacity: .7;
    }

    .newsletter-h {
      font-family: var(--font-d);
      font-size: clamp(40px, 9vw, 72px);
      line-height: .92;
      letter-spacing: .02em;
      margin-top: 8px;
      margin-bottom: 16px;
    }

    .newsletter-h span {
      color: var(--blue);
    }

    .newsletter-desc {
      font-size: 13px;
      color: var(--cream-2);
      line-height: 1.75;
      max-width: 420px;
    }

    .newsletter-perks {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 28px;
    }

    .newsletter-perk {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--cream-2);
    }

    .newsletter-perk::before {
      content: '//';
      color: var(--blue);
      font-size: 9px;
      font-weight: 700;
      font-family: var(--font-m);
      flex-shrink: 0;
    }

    .newsletter-form-wrap {
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      padding: 28px;
      position: relative;
      z-index: 1;
    }

    @media(min-width:640px) {
      .newsletter-form-wrap {
        padding: 36px;
      }
    }

    .newsletter-form-h {
      font-family: var(--font-d);
      font-size: clamp(28px, 5vw, 40px);
      letter-spacing: .02em;
      margin-bottom: 4px;
      line-height: 1;
    }

    .newsletter-form-sub {
      font-size: 11px;
      color: var(--cream-3);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .newsletter-input-wrap {
      position: relative;
      border-bottom: 1px solid var(--wire);
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      transition: border-color .2s;
    }

    .newsletter-input-wrap:focus-within {
      border-bottom-color: var(--blue);
    }

    .newsletter-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      color: var(--cream);
      font-size: 14px;
      font-family: var(--font-m);
      outline: none;
      min-height: 48px;
    }

    .newsletter-input::placeholder {
      color: var(--cream-3);
    }

    .newsletter-submit {
      padding: 0 20px;
      min-height: 48px;
      background: var(--blue);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: var(--font-m);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: background .18s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .newsletter-submit:hover,
    .newsletter-submit:active {
      background: var(--blue-hi);
    }

    .newsletter-privacy {
      font-size: 10px;
      color: var(--cream-3);
      line-height: 1.55;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px;
      background: var(--void);
      border: 1px solid var(--wire);
    }

    .newsletter-privacy::before {
      content: '//';
      color: var(--cream-3);
      font-size: 8.5px;
      flex-shrink: 0;
      margin-top: 1px;
      font-weight: 700;
    }

    .newsletter-count {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--wire);
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .newsletter-count strong {
      font-family: var(--font-d);
      font-size: 22px;
      color: var(--cream);
      letter-spacing: .02em;
    }

    /* ═══════════════════════════════════════════════════════
       § 19. FAQ SECTION
    ═══════════════════════════════════════════════════════ */
    .faq-section {
      padding: var(--space-xl) 0;
    }

    .faq-inner {
      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;
    }

    .faq-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
    }

    @media(min-width:900px) {
      .faq-layout {
        grid-template-columns: 1fr 1fr;
        gap: 72px;
      }
    }

    .faq-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .faq-h {
      font-family: var(--font-d);
      font-size: clamp(44px, 10vw, 80px);
      line-height: .92;
      letter-spacing: .02em;
      margin-bottom: 14px;
      margin-top: 8px;
    }

    .faq-desc {
      font-size: 13px;
      color: var(--cream-3);
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 32px;
    }

    .faq-item {
      border-bottom: 1px solid var(--wire);
    }

    .faq-q {
      width: 100%;
      min-height: 56px;
      padding: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
      font-size: 13px;
      color: var(--cream-2);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .18s;
    }

    .faq-q.active,
    .faq-q:hover {
      color: var(--cream);
    }

    .faq-chev {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      transition: transform .26s;
      color: var(--cream-3);
    }

    .faq-q.active .faq-chev {
      transform: rotate(180deg);
      color: var(--blue);
    }

    .faq-a {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all .3s ease;
    }

    .faq-a.open {
      max-height: 200px;
      opacity: 1;
      padding-bottom: 16px;
    }

    .faq-a p {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.75;
    }

    .faq-contact {
      background: var(--void-1);
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      padding: 28px;
    }

    @media(min-width:640px) {
      .faq-contact {
        padding: 36px;
      }
    }

    .faq-contact-h {
      font-family: var(--font-d);
      font-size: clamp(32px, 7vw, 44px);
      letter-spacing: .02em;
      margin-bottom: 4px;
      line-height: 1;
    }

    .faq-contact-sub {
      font-size: 12px;
      color: var(--cream-3);
      margin-bottom: 24px;
      line-height: 1.65;
    }

    .f-input,
    .f-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--wire);
      padding: 12px 0;
      color: var(--cream);
      font-size: 14px;
      font-family: var(--font-m);
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
      min-height: 48px;
    }

    .f-input::placeholder,
    .f-textarea::placeholder {
      color: var(--cream-3);
    }

    .f-input:focus,
    .f-textarea:focus {
      border-bottom-color: var(--blue);
    }

    .f-textarea {
      resize: none;
      min-height: 88px;
    }

    .f-submit {
      width: 100%;
      min-height: 52px;
      padding: 0 20px;
      background: transparent;
      color: var(--cream-2);
      font-family: var(--font-m);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      border: 1px solid var(--wire-2);
      cursor: pointer;
      transition: all .18s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .f-submit:hover,
    .f-submit:active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    /* ═══════════════════════════════════════════════════════
       § 20. FOOTER
    ═══════════════════════════════════════════════════════ */
    .footer {
      background: var(--void);
      border-top: 2px solid var(--wire);
      overflow: hidden;
    }

    .footer-top {
      padding: 44px var(--px) 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 44px;
      border-bottom: 1px solid var(--wire);
      padding-bottom: 44px;
      max-width: 1440px;
      margin: 0 auto;
    }

    @media(min-width:900px) {
      .footer-top {
        grid-template-columns: 1fr auto;
        gap: 80px;
        padding: 56px 48px 56px;
      }
    }

    .footer-logo {
      height: 100px;
      width: auto;
      margin-bottom: 14px;
    }

    .footer-tagline {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.7;
      max-width: 260px;
      margin-bottom: 14px;
    }

    .footer-tagline .acc {
      color: var(--blue);
    }

    .footer-social {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--wire);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-3);
      min-height: 44px;
      transition: all .18s;
    }

    .footer-social svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .footer-social:hover {
      border-color: var(--cream-3);
      color: var(--cream);
    }

    .footer-copy {
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--cream-3);
      margin-top: 14px;
    }

    .footer-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media(min-width:480px) {
      .footer-cols {
        gap: 40px;
      }
    }

    .footer-col-h {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 16px;
    }

    .footer-col-h::before {
      content: '[';
      opacity: .6;
    }

    .footer-col-h::after {
      content: ']';
      opacity: .6;
    }

    .footer-col ul {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-col ul a {
      font-size: 12px;
      color: var(--cream-3);
      transition: color .18s;
      cursor: pointer;
    }

    .footer-col ul a:hover {
      color: var(--cream);
    }

    .footer-location {
      border-top: 1px solid var(--wire);
      padding: 32px var(--px);
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media(min-width:768px) {
      .footer-location {
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        align-items: start;
      }
    }

    .footer-loc-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .footer-loc-h {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .footer-loc-h::before {
      content: '[';
      opacity: .6;
    }

    .footer-loc-h::after {
      content: ']';
      opacity: .6;
    }

    .footer-loc-address {
      font-size: 12px;
      color: var(--cream-2);
      line-height: 1.75;
    }

    .footer-loc-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--wire);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
      transition: all .18s;
      min-height: 44px;
      width: fit-content;
      cursor: pointer;
    }

    .footer-loc-link:hover {
      border-color: var(--blue);
      color: var(--cream);
    }

    .footer-loc-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .footer-map-wrap {
      border: 1px solid var(--wire);
      overflow: hidden;
      position: relative;
      aspect-ratio: 16/9;
      max-height: 220px;
      width: 100%;
      max-width: 400px;
    }

    @media(min-width:768px) {
      .footer-map-wrap {
        justify-self: end;
      }
    }

    .footer-map-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      filter: invert(90%) hue-rotate(180deg) brightness(0.95) contrast(1.1);
    }

    .footer-big {
      font-family: var(--font-d);
      font-size: clamp(64px, 16vw, 180px);
      line-height: .82;
      letter-spacing: .02em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(226, 217, 200, .04);
      text-align: right;
      padding: 0 var(--px);
      pointer-events: none;
      user-select: none;
      max-width: 1440px;
      margin: 0 auto;
    }

    .footer-terminal-line {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px var(--px);
      border-top: 1px solid var(--wire);
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--cream-3);
      max-width: 1440px;
      margin: 0 auto;

    .ftr-prompt {

    /* ═══════════════════════════════════════════════════════
       § 21. FORM ELEMENTS
    ═══════════════════════════════════════════════════════ */
    .form-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--wire);
      padding: 12px 0;
      color: var(--cream);
      font-size: 15px;
      font-family: var(--font-m);
      outline: none;
      margin-bottom: 20px;
      transition: border-color .2s;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      border-radius: 0;
    }

    .form-select option {
      background: var(--void-1);
      color: var(--cream);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--cream-3);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-bottom-color: var(--blue);
    }

    .form-textarea {
      resize: none;
      min-height: 110px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    @media(min-width:540px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
    }

    .form-submit {
      width: 100%;
      min-height: 54px;
      padding: 0 24px;
      background: var(--blue);
      color: #fff;
      font-family: var(--font-m);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background .18s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-submit:hover,
    .form-submit:active {
      background: var(--blue-hi);
    }

    /* ═══════════════════════════════════════════════════════
       § 22. ABOUT PAGE
    ═══════════════════════════════════════════════════════ */
    .about-hero {
      min-height: auto;
      display: flex;
      align-items: center;
      padding: 100px var(--px) 48px;
      background: var(--void-1);
      border-bottom: 1px solid var(--wire);

      overflow: hidden;
    }

        padding-bottom: 48px;

    .about-hero::before {
      content: 'CLASSIFIED';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);

      letter-spacing: .06em;

    .about-hero-h {

      letter-spacing: .02em;

    .about-layout {

    .about-stat-num {

      font-weight: 700;

    .founder-tag {

    }

    .values-section {
      border-top: 1px solid var(--wire);

    }

    .values-inner {

    }

    .values-grid {
      display: grid;

      }
    }

    @media(min-width:1024px) {

        grid-template-columns: repeat(3, 1fr);
      }
    }

      background: var(--void-1);
      padding: 28px;
    }

    .value-num {
      font-family: var(--font-d);
      font-size: 36px;
      color: var(--blue);

      margin-bottom: 12px;
    }

    .value-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .value-text {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.65;
    }

    /* ═══════════════════════════════════════════════════════
       § 23. CONTACT PAGE
    ═══════════════════════════════════════════════════════ */
    .contact-section {
      padding: calc(24px + 52px + 32px) 0 var(--space-xl);
    }

    @media(min-width:640px) {
      .contact-section {
        padding-top: calc(28px + 52px + 40px);
      }
    }

    .contact-inner {

    }

    }

    @media(min-width:900px) {
      .contact-layout {
        grid-template-columns: 1fr 1fr;
        gap: 72px;
      }
    }

    .contact-h {
      font-family: var(--font-d);
      font-size: clamp(48px, 11vw, 100px);
      line-height: .9;
      letter-spacing: .02em;
      margin-bottom: 18px;

    }

    .contact-desc {
      font-size: 13px;
      color: var(--cream-3);

    }

    .contact-channels {

    .c-icon {
      width: 36px;

    .c-label {

      font-weight: 700;

    }

    .c-val {
      font-size: 13px;
      color: var(--cream);
    }

    .contact-form-card {
      border: 1px solid var(--wire);

      padding: 28px;
    }

    @media(min-width:640px) {
      .contact-form-card {
        padding: 40px;
      }
    }

    /* ═══════════════════════════════════════════════════════
       § 24. PROGRAM DETAIL PAGES
    ═══════════════════════════════════════════════════════ */
    .prog-hero-page {
      min-height: auto;
      display: flex;
      flex-direction: column;

      overflow: hidden;

      display: none;

      font-size: clamp(140px, 20vw, 280px);

      border: 1px solid;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .prog-h {
      font-family: var(--font-d);
      font-size: clamp(48px, 12vw, 120px);
      line-height: .88;
      letter-spacing: .02em;
      margin-bottom: 18px;
    }

    .prog-hero-desc {
      font-size: 13px;
      color: var(--cream-2);
      line-height: 1.75;
      max-width: 540px;
    }

    .prog-meta-strip {
      background: var(--void-2);
      border-bottom: 1px solid var(--wire);
    }

    .prog-meta-row {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);

    @media(min-width:640px) {

        border-right: 1px solid var(--wire);
      }

      .prog-meta-cell:last-child {
        border-right: none;
      }
    }

    .pm-key {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);

    }

    .pm-val {
      font-size: 13px;
      color: var(--cream);
      font-weight: 500;
    }

    .curriculum-section {
      padding: var(--space-xl) 0;
    }

    .curriculum-inner {
      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;
    }

    .curriculum-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;

    @media(min-width:900px) {

      content: '//';

      font-size: 9px;

      align-items: center;
      cursor: pointer;

      text-align: center;

       § 25. EVENTS PAGE
    ═══════════════════════════════════════════════════════ */
    .events-hero {
      min-height: auto;
      display: flex;
      align-items: center;
      padding: 100px var(--px) 52px;
      background: var(--void-1);
      border-bottom: 2px solid var(--wire);
      position: relative;
      overflow: hidden;
    }

        padding-top: 56px;
        align-items: flex-end;
        padding-bottom: 52px;
      }

    .events-hero::before {
      content: 'EVENTS';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-family: var(--font-d);
      font-size: 120px;
      letter-spacing: .06em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 123, 255, .05);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .events-hero-h {
      font-family: var(--font-d);

      letter-spacing: .02em;
      margin-top: 12px;
      max-width: 900px;

      font-size: 13px;
      color: var(--cream-3);
      margin-top: 14px;

      line-height: 1.7;

      padding: 0 var(--px);
      max-width: 1440px;
      margin: 0 auto;

      display: flex;
      align-items: center;
      gap: 1px;
      margin-bottom: 36px;
      flex-wrap: wrap;

      min-height: 38px;
      font-family: var(--font-m);

      transition: all .18s;

      color: #fff;

      color: var(--cream);

      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--wire);

      .events-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(min-width:1024px) {
      .events-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      overflow: hidden;
      transition: background .2s;
      cursor: pointer;

      content: '';

      left: 0;
      right: 0;

    .event-card-title {
