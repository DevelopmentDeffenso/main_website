    }

    .event-card-desc {
      font-size: 12px;
      color: var(--cream-3);
      line-height: 1.65;
      flex-grow: 1;
      margin-bottom: 20px;
    }

    .event-card-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--wire);
    }

    .event-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--cream-3);
    }

    .event-meta-icon {
      color: var(--blue);
      flex-shrink: 0;
    }

    .event-meta-label {
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 8.5px;
      color: var(--cream-3);
      flex-shrink: 0;
    }

    .event-card-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--wire);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--blue);
      min-height: 40px;
    }

    .event-card-action svg {
      transition: transform .2s;
    }

    .event-card:hover .event-card-action svg {
      transform: translateX(4px);
    }

    /* Featured event (full width) */
    .event-card.featured {
      grid-column: 1/-1;
      display: grid;
      gap: 32px;
    }

    @media(min-width:640px) {
      .event-card.featured {
        grid-template-columns: 1fr 1fr;
      }
    }

    .event-card.featured .event-card-title {
      font-size: clamp(32px, 5vw, 52px);
    }

    /* Live dot for live events */
    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulseDot 1.2s infinite;
      flex-shrink: 0;
    }

    /* Upcoming CTA strip */
    .events-cta-strip {
      margin-top: 40px;
      padding: 24px 28px;
      border: 1px solid var(--wire);
      border-left: 3px solid var(--blue);
      background: var(--void-1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .events-cta-text {
      font-size: 12px;
      color: var(--cream-3);
      max-width: 420px;
      line-height: 1.65;
    }

    .events-cta-text strong {
      color: var(--cream);
    }

    /* § 26. TOAST & IP TRACKER — removed */

    /* ═══════════════════════════════════════════════════════
       § 27. CENTER PAGES (404 / LOGIN)
    ═══════════════════════════════════════════════════════ */
    .center-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem var(--px);
      padding-top: 4rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      padding: 28px;
      background: var(--void-1);
    }

    .login-h {
      font-family: var(--font-d);
      font-size: 40px;
      letter-spacing: .02em;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 12px;
      color: var(--cream-3);
      margin-bottom: 28px;
    }

    .login-btn {
      width: 100%;
      min-height: 52px;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      border: none;
      transition: background .18s;
      cursor: pointer;
    }

    .not-found-inner {
      text-align: center;
    }

    .not-found-code {
      font-family: var(--font-d);
      font-size: clamp(80px, 20vw, 180px);
      line-height: 1;
      color: var(--cream);
    }

    .not-found-msg {
      font-size: 12px;
      color: var(--cream-3);
      margin: 14px 0;
      letter-spacing: .1em;
    }

    .not-found-link {
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ═══════════════════════════════════════
       FOUNDERS SECTION
    ═══════════════════════════════════════ */
    .founders-section {
      background: var(--void);
      padding: 96px 0 112px;
      position: relative;
      overflow: hidden;
    }

    .founders-wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════
       HEADER BLOCK
    ═══════════════════════════════════════ */
    .fdr-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      margin-bottom: 2px;
      overflow: hidden;
    }

    @media(max-width:767px) {
      .fdr-header {
        grid-template-columns: 1fr;
      }
    }

    .fdr-h-left {
      padding: 52px 52px 52px 44px;
      border-right: 1px solid var(--wire);
      position: relative;
      overflow: hidden;
      background: var(--void-1);
    }

    @media(max-width:767px) {
      .fdr-h-left {
        border-right: none;
        border-bottom: 1px solid var(--wire);
        padding: 36px 24px;
      }
    }

    /* watermark */
    .fdr-h-left::after {
      content: '03';
      position: absolute;
      right: -8px;
      bottom: -24px;
      font-family: var(--font-d);
      font-size: 200px;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 123, 255, .05);
      pointer-events: none;
      user-select: none;
    }

    .fdr-eyebrow {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .fdr-eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--blue);
      flex-shrink: 0;
    }

    .fdr-big-title {
      font-family: var(--font-d);
      font-size: clamp(54px, 7vw, 100px);
      line-height: .88;
      letter-spacing: .02em;
      color: #fff;
    }

    .fdr-big-title em {
      font-style: normal;
      color: var(--blue);
      display: block;
    }

    .fdr-h-right {
      padding: 44px 44px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      background: var(--void-1);
    }

    @media(max-width:767px) {
      .fdr-h-right {
        padding: 28px 24px;
      }
    }

    .fdr-desc {
      font-size: 13px;
      color: var(--cream-3);
      line-height: 1.85;
    }

    .fdr-terminal {
      background: var(--void-2);
      border: 1px solid var(--wire-2);
      border-left: 2px solid var(--blue);
      padding: 14px 18px;
      font-size: 10px;
      line-height: 2;
    }

    .fdr-term-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fdr-prompt {
      color: var(--blue);
      font-weight: 700;
    }

    .fdr-cmd {
      color: var(--cream-3);
    }

    .fdr-val {
      color: var(--green);
      font-weight: 700;
    }

    .pip {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.4s infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    .fdr-stats {
      display: flex;
      border: 1px solid var(--wire);
    }

    .fdr-stat {
      flex: 1;
      padding: 14px 16px;
      border-right: 1px solid var(--wire);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .fdr-stat:last-child {
      border-right: none;
    }

    .fdr-stat-n {
      font-family: var(--font-d);
      font-size: 28px;
      line-height: 1;
      color: var(--blue);
      letter-spacing: .02em;
    }

    .fdr-stat-l {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    /* ═══════════════════════════════════════
       FOUNDER ROW
    ═══════════════════════════════════════ */
    .founder-row {
      display: grid;
      grid-template-columns: 400px 1fr;
      border: 1px solid var(--wire);
      border-top: none;
      overflow: hidden;
      position: relative;
      background: var(--void-1);
      animation: fadeUp .45s ease both;
      transition: background .2s;
    }

    .founder-row:nth-child(1) {
      animation-delay: .06s
    }

    .founder-row:nth-child(2) {
      animation-delay: .14s
    }

    .founder-row:nth-child(3) {
      animation-delay: .22s
    }

    /* alternating layout */
    .founder-row.r-flip {
      grid-template-columns: 1fr 400px;
    }

    .founder-row.r-flip .fr-photo {
      order: 2;
      border-left: 1px solid var(--wire);
      border-right: none;
    }

    .founder-row.r-flip .fr-content {
      order: 1;
    }

    @media(max-width:900px) {

      .founder-row,
      .founder-row.r-flip {
        grid-template-columns: 1fr;
      }

      .founder-row.r-flip .fr-photo {
        order: 1;
        border-left: none;
        border-right: none;
        border-bottom: 1px solid var(--wire);
      }

      .founder-row.r-flip .fr-content {
        order: 2;
      }
    }

    .founder-row:hover {
      background: #0c0c0c;
    }

    /* top blue hover bar */
    .founder-row::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--blue-hi), var(--blue));
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity .28s;
      animation: flowBdr 2s linear infinite;
      z-index: 4;
    }

    .founder-row:hover::before {
      opacity: 1;
    }

    /* ── PHOTO PANEL ── */
    .fr-photo {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--wire);
      min-height: 460px;
      background: var(--void-2);
      flex-shrink: 0;
    }

    @media(max-width:900px) {
      .fr-photo {
        min-height: 300px;
        border-right: none;
        border-bottom: 1px solid var(--wire);
      }
    }

    .fr-photo-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: grayscale(10%) contrast(1.05);
      transition: filter .4s, transform .5s;
      z-index: 1;
    }

    .founder-row:hover .fr-photo-img {
      filter: grayscale(0%) contrast(1.08);
      transform: scale(1.03);
    }



    /* gradient overlay (works on both photo and placeholder) */
    .fr-photo-grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
          rgba(3, 3, 3, .85) 0%,
          rgba(3, 3, 3, .3) 40%,
          transparent 70%);
      z-index: 2;
      pointer-events: none;
    }

    /* scan line */
    .fr-scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 123, 255, .55), transparent);
      top: -4px;
      z-index: 3;
      opacity: 0;
      transition: opacity .2s;
      animation: scanDown 2.8s linear infinite;
    }

    .founder-row:hover .fr-scan {
      opacity: 1;
    }

    /* corner brackets */
    .fr-c {
      position: absolute;
      width: 16px;
      height: 16px;
      z-index: 3;
      pointer-events: none;
    }

    .fr-c.tl {
      top: 14px;
      left: 14px;
      border-top: 2px solid var(--blue);
      border-left: 2px solid var(--blue);
      opacity: .5;
    }

    .fr-c.tr {
      top: 14px;
      right: 14px;
      border-top: 2px solid var(--blue);
      border-right: 2px solid var(--blue);
      opacity: .5;
    }

    .fr-c.bl {
      bottom: 14px;
      left: 14px;
      border-bottom: 2px solid var(--blue);
      border-left: 2px solid var(--blue);
      opacity: .5;
    }

    .fr-c.br {
      bottom: 14px;
      right: 14px;
      border-bottom: 2px solid var(--blue);
      border-right: 2px solid var(--blue);
      opacity: .5;
    }

    /* clearance strip — bottom of photo */
    .fr-clearance {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(3, 3, 3, .9);
      border: 1px solid rgba(0, 255, 65, .18);
      padding: 6px 14px;
    }

    .fr-clearance::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulseDot 2s infinite;
      flex-shrink: 0;
    }

    /* ── CONTENT PANEL ── */
    .fr-content {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* command bar */
    .fr-cmdbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 28px;
      border-bottom: 1px solid var(--wire);
      background: var(--void-2);
      gap: 10px;
      flex-wrap: wrap;
    }

    .fr-cmdtext {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .1em;
      color: var(--cream-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fr-cmdtext b {
      color: var(--blue);
      font-weight: 700;
    }

    .fr-idx {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--cream-3);
      border: 1px solid var(--wire-2);
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* main info */
    .fr-info {
      padding: 32px 36px 24px;
      border-bottom: 1px solid var(--wire);
      flex: 1;
    }

    @media(max-width:600px) {
      .fr-info {
        padding: 24px 20px 20px;
      }
    }

    .fr-role-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--blue);
      border: 1px solid rgba(0, 123, 255, .25);
      background: rgba(0, 123, 255, .06);
      margin-bottom: 16px;
    }

    .fr-name {
      font-family: var(--font-d);
      font-size: clamp(42px, 5.5vw, 72px);
      line-height: .9;
      letter-spacing: .02em;
      color: #fff;
      margin-bottom: 8px;
    }

    .fr-title-line {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 3px;
    }

    .fr-org-line {
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--cream-3);
      margin-bottom: 22px;
    }

    .fr-rule {
      width: 36px;
      height: 1px;
      background: var(--blue);
      opacity: .35;
      margin-bottom: 18px;
    }

    .fr-bio {
      font-size: 13px;
      color: var(--cream-3);
      line-height: 1.85;
      max-width: 500px;
    }

    /* skill bars */
    .fr-skills {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 22px 36px;
      border-bottom: 1px solid var(--wire);
    }

    @media(max-width:700px) {
      .fr-skills {
        grid-template-columns: 1fr;
        padding: 18px 20px;
        gap: 14px;
      }
    }

    @media(max-width:900px) and (min-width:701px) {
      .fr-skills {
        grid-template-columns: 1fr 1fr;
      }
    }

    .skill-item {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .skill-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .skill-lbl {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .skill-pct {
      font-family: var(--font-d);
      font-size: 18px;
      line-height: 1;
      color: var(--blue);
    }

    .skill-track {
      height: 2px;
      background: var(--wire-2);
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--blue-hi));
      width: 0;
      transition: width 1.1s cubic-bezier(.22, .61, .36, 1) var(--d, 0s);
    }

    .skill-fill.on {
      width: var(--w);
    }

    /* footer */
    .fr-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 36px;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media(max-width:600px) {
      .fr-footer {
        padding: 13px 20px;
      }
    }

    .fr-loc {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .fr-loc svg {
      opacity: .4;
    }

    .fr-active {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
    }

    .fr-active-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .btn-nav-login {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--blue);
      border-left: 1px solid var(--wire);
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
      background: none;
      cursor: pointer;
      position: relative;
    }

    .btn-nav-login:hover {
      color: var(--blue-hi);
      background: var(--blue-dim);
    }

    .btn-nav-login::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s;
    }

    .btn-nav-login:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    @media(min-width:1024px) {
      .btn-nav-login {
        display: flex;
      }
    }

    /* Login Page Styles */
    .login-hero {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px var(--px);
      position: relative;
      overflow: hidden;
      background: var(--void);
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      animation: pIn .4s ease both;
    }

    .login-card {
      background: var(--void-1);
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .login-hdr {
      display: flex;
      align-items: center;
      height: 36px;
      gap: 10px;
      padding: 0 16px;
      background: var(--void-2);
      border-bottom: 1px solid var(--wire);
    }

    .login-body {
      padding: 44px 32px;
    }

    .login-h {
      font-family: var(--font-d);
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .login-sub {
      font-size: 11px;
      color: var(--cream-3);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .login-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--wire);
      display: flex;
      justify-content: center;
    }

    .forgot-link {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--cream-3);
      cursor: pointer;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--blue);
    }

    /* ═══════════════════════════════════════════════════════
       § TOOLS WE TEACH SECTION
    ═══════════════════════════════════════════════════════ */
    /* ── SHIMMER SWEEP (card hover) ── */
    @keyframes toolShimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    /* ── LOGO ENTRANCE: float up + fade in, staggered per card ── */
    @keyframes logoFloat {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(.88);
      }

      60% {
        opacity: 1;
        transform: translateY(-4px) scale(1.03);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── LOGO IDLE: subtle floating bob ── */
    @keyframes logoBob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    /* ── LOGO SCAN LINE: sweeps across the logo ── */
    @keyframes scanSweep {
      0% {
        top: -10%;
        opacity: .6;
      }

      100% {
        top: 110%;
        opacity: 0;
      }
    }

    /* ── LOGO PULSE RING: expands and fades ── */
    @keyframes pulseRing {
      0% {
        transform: scale(.7);
        opacity: .7;
      }

      70% {
        transform: scale(1.55);
        opacity: 0;
      }

      100% {
        transform: scale(1.55);
        opacity: 0;
      }
    }

    /* ── GLOW FLICKER: hacker terminal glow on entrance ── */
    @keyframes glowFlicker {

      0%,
      100% {
        filter: drop-shadow(0 0 0px rgba(0, 123, 255, 0));
      }

      15% {
        filter: drop-shadow(0 0 14px rgba(0, 123, 255, .9));
      }

      30% {
        filter: drop-shadow(0 0 4px rgba(0, 123, 255, .4));
      }

      45% {
        filter: drop-shadow(0 0 18px rgba(0, 123, 255, 1));
      }

      60% {
        filter: drop-shadow(0 0 6px rgba(0, 123, 255, .5));
      }

      75% {
        filter: drop-shadow(0 0 12px rgba(0, 123, 255, .7));
      }
    }

    /* ── CORNER BRACKETS animate in ── */
    @keyframes bracketIn {
      0% {
        opacity: 0;
        transform: scale(.6);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ── HEX GRID BG ── */
    .tools-section {
      padding: var(--space-xl) 0;
      background: var(--void-1);
      position: relative;
      overflow: hidden;
    }

    .tools-section::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(0, 123, 255, .07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── SCAN LINES OVERLAY ── */
    .tools-section::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom,
          transparent 0px, transparent 3px,
          rgba(0, 0, 0, .04) 3px, rgba(0, 0, 0, .04) 4px);
    }

    .tools-inner {
      position: relative;
      z-index: 1;
      padding: 0 var(--px);
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .tools-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-m);
    }

    .tools-eyebrow::before {
      content: '//';
      opacity: .6;
    }

    .tools-title {
      font-family: var(--font-d);
      font-size: clamp(28px, 6vw, 52px);
      line-height: 1.05;
      letter-spacing: .01em;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .tools-title span {
      color: var(--blue);
    }

    .tools-subtitle {
      font-size: 13px;
      color: var(--cream-3);
      line-height: 1.7;
      max-width: 540px;
      margin-bottom: 36px;
    }

    /* ── GRID ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 560px) {
      .tools-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
    }

    @media (min-width: 900px) {
      .tools-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
    }

    /* ── TOOL CARD ── */
    .tool-card {
      position: relative;
      background: var(--void);
      border: 1px solid var(--wire-2);
      border-radius: 14px;
      padding: 26px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
      transition: border-color .22s, transform .22s, box-shadow .22s;
      /* stagger entrance */
      opacity: 0;
      animation: cardEntrance .5s ease forwards;
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* stagger delay per card */
    .tool-card:nth-child(1) {
      animation-delay: .05s;
    }

    .tool-card:nth-child(2) {
      animation-delay: .12s;
    }

    .tool-card:nth-child(3) {
      animation-delay: .19s;
    }

    .tool-card:nth-child(4) {
      animation-delay: .26s;
    }

    .tool-card:nth-child(5) {
      animation-delay: .33s;
    }

    .tool-card:nth-child(6) {
      animation-delay: .40s;
    }

    .tool-card:nth-child(7) {
      animation-delay: .47s;
    }

    .tool-card:nth-child(8) {
      animation-delay: .54s;
    }

    /* top accent line */
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      border-radius: 0 0 4px 4px;
      background: transparent;
      transition: background .22s;
    }

    .tool-card:hover::before,
    .tool-card:active::before {
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    /* shimmer gradient on hover */
    .tool-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, transparent 40%, rgba(0, 123, 255, .04) 60%, transparent 80%);
      opacity: 0;
      transition: opacity .22s;
    }

    .tool-card:hover::after {
      opacity: 1;
      animation: toolShimmer .65s ease forwards;
    }

    .tool-card:hover,
    .tool-card:active {
      border-color: rgba(0, 123, 255, .5);
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, .6), 0 0 0 1px rgba(0, 123, 255, .18), 0 0 28px rgba(0, 123, 255, .07);
    }

    /* ── CORNER BRACKET DECORATIONS ── */
    .tool-card .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: rgba(0, 123, 255, .28);
      border-style: solid;
      opacity: 0;
      transition: opacity .3s, border-color .3s;
      animation: bracketIn .4s ease forwards;
      animation-play-state: paused;
    }

    .tool-card:hover .corner,
    .tool-card:active .corner {
      opacity: 1;
      animation-play-state: running;
      border-color: rgba(0, 123, 255, .6);
    }

    .corner.tl {
      top: 8px;
      left: 8px;
      border-width: 1px 0 0 1px;
    }

    .corner.tr {
      top: 8px;
      right: 8px;
      border-width: 1px 1px 0 0;
    }

    .corner.bl {
      bottom: 8px;
      left: 8px;
      border-width: 0 0 1px 1px;
    }

    .corner.br {
      bottom: 8px;
      right: 8px;
      border-width: 0 1px 1px 0;
    }

    /* ── LOGO WRAP ── */
    .tool-logo-wrap {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      position: relative;
      flex-shrink: 0;
      border-radius: 50%;
    }

    @media (min-width: 640px) {
      .tool-logo-wrap {
        width: 80px;
        height: 80px;
      }
    }

    /* ── PULSE RING (always, subtle) ── */
    .tool-logo-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(0, 123, 255, .12);
      animation: pulseRing 3s ease-out infinite;
    }

    /* ── HOVER RING ── */
    .tool-card:hover .tool-logo-wrap::after,
    .tool-card:active .tool-logo-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(0, 123, 255, .4);
      box-shadow: 0 0 20px rgba(0, 123, 255, .22), inset 0 0 10px rgba(0, 123, 255, .06);
    }

    /* ── LOGO IMAGE ── */
    .tool-logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
      /* entrance animation */
      animation:
        logoFloat .7s cubic-bezier(.34, 1.56, .64, 1) both,
        glowFlicker 1.4s ease .7s 1,
        logoBob 4s ease-in-out 2.1s infinite;
      position: relative;
      z-index: 1;
      transition: transform .22s, filter .22s;
    }

    /* stagger logo animation per card */
    .tool-card:nth-child(1) .tool-logo-img {
      animation-delay: .05s, .75s, 2.15s;
    }

    .tool-card:nth-child(2) .tool-logo-img {
      animation-delay: .12s, .82s, 2.22s;
    }

    .tool-card:nth-child(3) .tool-logo-img {
      animation-delay: .19s, .89s, 2.29s;
    }

    .tool-card:nth-child(4) .tool-logo-img {
      animation-delay: .26s, .96s, 2.36s;
    }

    .tool-card:nth-child(5) .tool-logo-img {
      animation-delay: .33s, 1.03s, 2.43s;
    }

    .tool-card:nth-child(6) .tool-logo-img {
      animation-delay: .40s, 1.10s, 2.50s;
    }

    .tool-card:nth-child(7) .tool-logo-img {
      animation-delay: .47s, 1.17s, 2.57s;
    }

    .tool-card:nth-child(8) .tool-logo-img {
      animation-delay: .54s, 1.24s, 2.64s;
    }

    .tool-card:hover .tool-logo-img,
    .tool-card:active .tool-logo-img {
      animation: none;
      filter: brightness(1.12) saturate(1.15) drop-shadow(0 0 10px rgba(0, 123, 255, .38));
      transform: scale(1.1) rotate(-2deg);
    }

    /* ── SCAN LINE ON LOGO WRAP ── */
    .tool-logo-scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 123, 255, .7), transparent);
      top: -10%;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      border-radius: 2px;
      /* runs continuously, staggered */
      animation: scanSweep 3s linear infinite;
    }

    .tool-card:nth-child(odd) .tool-logo-scan {
      animation-delay: 0s;
    }

    .tool-card:nth-child(even) .tool-logo-scan {
      animation-delay: 1.5s;
    }

    /* ── FALLBACK LABEL ── */
    .tool-logo-fallback {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(0, 123, 255, .28);
      border-radius: 10px;
      font-size: 9px;
      color: var(--blue);
      font-family: var(--font-m);
      letter-spacing: .04em;
      text-align: center;
      line-height: 1.45;
      padding: 6px;
      word-break: break-all;
    }

    /* ── TOOL NAME ── */
    .tool-name {
      font-family: var(--font-d);
      font-size: 19px;
      letter-spacing: .03em;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 7px;
    }

    @media (min-width: 640px) {
      .tool-name {
        font-size: 22px;
      }
    }

    /* ── TOOL DESC ── */
    .tool-desc {
      font-size: 10.5px;
      color: var(--cream-3);
      line-height: 1.55;
      font-family: var(--font-m);
      flex-grow: 1;
    }

    /* ── TAG ── */
    .tool-tag {
      margin-top: 13px;
      padding: 3px 9px;
      border: 1px solid rgba(0, 123, 255, .22);
      border-radius: 3px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--blue);
      font-family: var(--font-m);
      transition: background .2s, border-color .2s;
    }

    .tool-card:hover .tool-tag {
      background: rgba(0, 123, 255, .1);
      border-color: rgba(0, 123, 255, .5);
    }
  </style>
</head>

    (function () {

      emailjs.init({

      });
    })();

    async function sendEmail(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('.form-submit') || form.querySelector('.f-submit') || form.querySelector('[type="submit"]');
      const originalText = btn.textContent;

      try {
        btn.textContent = "// TRANSMITTING...";
        btn.disabled = true;

        // Service ID, Template ID, Form Element
        await emailjs.sendForm('service_jofne0x', 'template_g5b9j5r', form);

        alert('TRANSMISSION SUCCESSFUL. MESSAGE ENCRYPTED AND SENT.');
        form.reset();
      } catch (error) {
        console.error('EmailJS Error:', error);
        alert('TRANSMISSION FAILED. CHECK CONSOLE FOR LOGS.');
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }


    async function subscribeNewsletter(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('.newsletter-submit');
      const input = form.querySelector('.newsletter-input');
      const originalText = btn.innerHTML;

      try {
        btn.innerHTML = '// SUBSCRIBING...';
        btn.disabled = true;
        input.disabled = true;

        // URL of your deployed Google Apps Script Web App
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwgxDoJb21ui5XR0sMlVlzChWzSkxgBQs_ezoF58_1IServtLwHE-pRyOesOU-6cMjn/exec';

        if (scriptURL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
          console.warn('Developer Note: You must replace YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL with your Apps Script Web App URL.');
        }

        const email = input.value;

        // Append email as a URL parameter
        const finalURL = scriptURL + '?email=' + encodeURIComponent(email);

        await fetch(finalURL, {
          method: 'GET',
          mode: 'no-cors'
        });

        btn.innerHTML = '// SUBSCRIBED';
        alert('Welcome! You have been subscribed to the Intel Dispatch.');
      } catch (error) {
        console.error('Newsletter Error:', error);
        alert('SUBSCRIPTION FAILED. PLEASE TRY AGAIN');
        btn.innerHTML = originalText;
        btn.disabled = false;
        input.disabled = false;

    /* ═══════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════ */
    function initInteractivity() {
      // Guard: only attach persistent element listeners once
      const ham = document.getElementById('mob-ham');
      if (ham && !ham._bound) {
        ham._bound = true;
        ham.addEventListener('click', () => {
          const open = document.getElementById('mob-menu')?.classList.toggle('open');
          ham.classList.toggle('open', open);
          ham.setAttribute('aria-expanded', open ? 'true' : 'false');
          document.body.classList.toggle('menu-open', open);
        });
      }
      let openFaq = 0;
      document.querySelectorAll('.faq-item').forEach((item, idx) => {
        item.querySelector('.faq-q')?.addEventListener('click', () => {
          document.querySelectorAll('.faq-q').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.faq-a').forEach(a => a.classList.remove('open'));
          if (idx === openFaq) { openFaq = -1; return; }
          item.querySelector('.faq-q').classList.add('active');
          item.querySelector('.faq-a')?.classList.add('open');
          openFaq = idx;
        });
      });
    }


    /* ═══════════════════════════════════════════════════════
       JS § 8. GALLERY LIGHTBOX & FILTER
    ═══════════════════════════════════════════════════════ */
    function openLightbox(src, caption) {
      const lb = document.getElementById('gallery-lightbox');
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-caption').textContent = caption;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('gallery-lightbox')?.classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    function filterGallery(tag, btn) {
      document.querySelectorAll('.gallery-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.gallery-item').forEach(item => {
        const itemTag = item.querySelector('.gallery-item-tag')?.textContent;
        item.style.display = (tag === 'all' || itemTag === tag) ? '' : 'none';
      });
    }


    /* ═══════════════════════════════════════════════════════
       JS § 9. HERO CANVAS (Matrix Rain)
    ═══════════════════════════════════════════════════════ */
    function initHeroCanvas() {
      const canvas = document.getElementById('hero-canvas');
      if (!canvas || canvas._init) return;
      canvas._init = true;
      const ctx = canvas.getContext('2d');
      const COL_W = 11;
      let drops, cols, animId;
      function resize() {
        canvas.width = canvas.offsetWidth || window.innerWidth;
        canvas.height = canvas.offsetHeight || window.innerHeight;
        cols = Math.floor(canvas.width / COL_W) + 2;
        drops = Array.from({ length: cols }, () => Math.random() * (canvas.height / COL_W));
      }
      resize();
      window.addEventListener('resize', resize);
      function draw() {
        if (!document.getElementById('hero-canvas')) { clearInterval(animId); return; }
        ctx.fillStyle = 'rgba(0,0,0,0.038)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 12px "IBM Plex Mono", monospace';
        for (let i = 0; i < cols; i++) {
          const bit = Math.random() > .5 ? '1' : '0';
          const rand = Math.random();
          if (rand > .982) ctx.fillStyle = 'rgba(255,255,255,0.95)';
          else if (rand > .91) ctx.fillStyle = `rgba(30,140,255,${(Math.random() * .35 + .50).toFixed(2)})`;
          else if (rand > .60) ctx.fillStyle = `rgba(0,123,255,${(Math.random() * .25 + .28).toFixed(2)})`;
          else ctx.fillStyle = `rgba(0,70,180,${(Math.random() * .12 + .10).toFixed(2)})`;
          ctx.fillText(bit, i * COL_W, drops[i] * COL_W);
          if (drops[i] * COL_W > canvas.height + 20 && Math.random() > .965) drops[i] = -Math.random() * 12;
          drops[i] += 0.52;
        }
      }
      animId = setInterval(draw, 55);
    }


    /* ═══════════════════════════════════════════════════════
       JS § 10. HERO BOTTOM DATA STRIP
    ═══════════════════════════════════════════════════════ */
    function initHeroStrip() {
      const strip = document.getElementById('hero-strip');
      if (!strip) return;
      const items = [
        { v: '1.2M+', l: 'CYBER ATTACKS TODAY', al: true }, { v: '3.5M', l: 'UNFILLED CYBER JOBS', al: false },
        { v: '10', l: 'ACTIVE PROGRAMS', al: false }, { v: '500+', l: 'OPERATORS TRAINED', al: false },
        { v: '39s', l: 'AVG ATTACK INTERVAL', al: true }, { v: '94%', l: 'COMPLETION RATE', al: false },
        { v: 'LIVE', l: 'MENTORS ONLINE', al: false }, { v: '$0', l: 'HIDDEN FEES', al: false }, { v: '24HRS', l: 'RESPONSE TIME', al: false },
      ];
      strip.innerHTML = [...items, ...items].map(it =>
        `<div class="hstrip-item${it.al ? ' al' : ''}"><span class="sv">${it.v}</span>${it.l}</div><div class="hstrip-divider"></div>`
      ).join('');
    }


    /* ═══════════════════════════════════════════════════════
       JS § 11. COUNTER ANIMATIONS
    ═══════════════════════════════════════════════════════ */
    function animateCounters() {
      const animNum = (el, target, suffix, duration) => {
        if (!el) return;
        const start = performance.now();
        const step = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          const val = Math.round(ease * target);
          el.textContent = (val >= 1000000 ? (val / 1000000).toFixed(1) + 'M' : val) + suffix;
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      };
      const atkEl = document.getElementById('cnt-atk');
      if (atkEl) { let s = 0; const t = setInterval(() => { atkEl.textContent = ':' + (s < 10 ? '0' : '') + s + 's'; if (s >= 39) { clearInterval(t); atkEl.textContent = ':39s'; } s++; }, 60); }
      animNum(document.getElementById('cnt-jobs'), 3500000, '', 1800);
      animNum(document.getElementById('cnt-def'), 100, '%', 1400);
    }


    /* ═══════════════════════════════════════════════════════
       JS § 12. SCROLL HINT
    ═══════════════════════════════════════════════════════ */
    function initScrollHint() {
      const wrap = document.getElementById('prog-scroll');
      if (!wrap) return;
      const dots = document.querySelectorAll('.scroll-dot');
      if (!dots.length) return;
      wrap.addEventListener('scroll', () => {
        const cardW = wrap.querySelector('.program-card')?.offsetWidth || 290;
        const idx = Math.round(wrap.scrollLeft / (cardW + 1));
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }, { passive: true });
    }


    /* ═══════════════════════════════════════════════════════
       JS § 13. HEX STRIPS
    ═══════════════════════════════════════════════════════ */
    function randHex(n) { return Array.from({ length: n }, () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase()); }
    function buildHexStrip(trackId) {
      const track = document.getElementById(trackId);
      if (!track) return;
      let html = '';
      for (let i = 0; i < 64; i++) {
        const addr = '0x' + Math.floor(Math.random() * 0xFFFFFF).toString(16).toUpperCase().padStart(6, '0');
        const bytes = randHex(8);
        html += `<span class="hex-byte hi">${addr}</span><span class="hex-byte sep">│</span>`;
        bytes.forEach((b, j) => { html += `<span class="hex-byte${Math.random() > .82 ? ' hi' : ''}">${b}</span>`; if (j === 3) html += `<span class="hex-byte sep">·</span>`; });
        html += `<span class="hex-byte sep">│</span><span class="hex-byte">${bytes.map(b => String.fromCharCode(parseInt(b, 16)).replace(/[^\x20-\x7E]/g, '.')).join('')}</span><span class="hex-byte sep">  </span>`;
      }
      track.innerHTML = html;
    }
    function initHexStrips() { buildHexStrip('hex-track-1'); buildHexStrip('hex-track-2'); }


    /* ═══════════════════════════════════════════════════════
       JS § 14. STAT SCAN ANIMATION
    ═══════════════════════════════════════════════════════ */
    function initStatScan() {
      const stats = document.querySelectorAll('.stat-num');
      if (!stats.length) return;
      stats.forEach(el => { el.dataset.final = el.textContent; el.textContent = '...'; el.classList.add('scanning'); });
      let delay = 0;
      stats.forEach(el => {
        delay += 380;
        setTimeout(() => {
          let f = 0; const steps = 18;
          const id = setInterval(() => { el.textContent = f < steps - 1 ? ['SCAN', '>>>', '0x??', '----', '[?]'][Math.floor(Math.random() * 5)] : el.dataset.final; f++; if (f >= steps) { clearInterval(id); el.classList.remove('scanning'); } }, 55);
        }, delay);
      });
    }



    /* ═══════════════════════════════════════════════════════
       JS § 16. TEXT SCRAMBLE
    ═══════════════════════════════════════════════════════ */
    const CHARS = '01アBCDEFXYZ$#@!&?><';
    function scrambleEl(el) {
      const original = el.dataset.original || el.textContent;
      el.dataset.original = original;
      let frame = 0; const total = 14;
      const id = setInterval(() => {
        el.textContent = original.split('').map((c, i) => {
          if (c === ' ' || c === '\n') return c;
          if (i < (frame / total) * original.length) return c;
          return CHARS[Math.floor(Math.random() * CHARS.length)];
        }).join('');
        frame++;
        if (frame > total) { el.textContent = original; clearInterval(id); }
      }, 38);
    }
    function initScramble() {
      const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { scrambleEl(e.target); obs.unobserve(e.target); } }); }, { threshold: 0.6 });
      document.querySelectorAll('.section-hdr .shdr-title,.faq-h,.why-h,.gallery-h,.events-hero-h').forEach(el => obs.observe(el));
    }
    document.addEventListener('click', e => { const card = e.target.closest('.program-card'); if (card) { const t = card.querySelector('.prog-name'); if (t) scrambleEl(t); } });





    /* ═══════════════════════════════════════════════════════
       JS § 18. TOASTS — removed
       JS § 19. IP ATTACK TRACKER — removed
    ═══════════════════════════════════════════════════════ */


    /* ═══════════════════════════════════════════════════════
       JS § 20. BOOT
    ═══════════════════════════════════════════════════════ */
    const initHash = window.location.hash.replace('#', '');
    if (initHash === 'programs' || initHash === 'newsletter') {
      currentPage = 'home';
      render();
      setTimeout(() => {
        const el = document.getElementById(initHash);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }, 500); // give enough time for everything to render
    } else {
      currentPage = initHash || 'home';
      render();
    }

    // Global observer for founders skill bars
    const f_observer = new MutationObserver(() => {
      const fills = document.querySelectorAll('.skill-fill:not(.observed)');
      if (fills.length) {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); } });
        }, { threshold: 0.35 });
        fills.forEach(f => { f.classList.add('observed'); io.observe(f); });
      }
    });
    f_observer.observe(document.body, { childList: true, subtree: true });
  </script>
