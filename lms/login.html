<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DEFFENSO LMS — ACCESS PORTAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --void:#030303; --void-1:#0A0A0A; --void-2:#111111; --void-3:#1A1A1A;
  --cream:#E2D9C8; --cream-2:#A89E8D; --cream-3:#5A5249;
  --blue:#007BFF; --blue-hi:#3DA5FF; --blue-dim:rgba(0,123,255,0.12);
  --green:#00FF41; --wire:#1E1E1E; --wire-2:#2A2A2A;
  --font-d:'Bebas Neue',sans-serif; --font-m:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--void);color:var(--cream);font-family:var(--font-m);-webkit-font-smoothing:antialiased;}

/* Matrix canvas */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:0.6;}

/* Grain overlay */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;animation:grain .4s steps(1) infinite;}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}30%{transform:translate(3%,2%)}50%{transform:translate(-1%,4%)}70%{transform:translate(2%,-2%)}90%{transform:translate(-3%,1%)}}

/* Scan line */
.scan-line{position:fixed;left:0;right:0;height:2px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(0,123,255,.08) 12%,rgba(0,123,255,.55) 38%,rgba(45,143,255,.95) 50%,rgba(0,123,255,.55) 62%,rgba(0,123,255,.08) 88%,transparent 100%);
  box-shadow:0 0 10px rgba(0,123,255,.45),0 0 24px rgba(0,123,255,.15);
  animation:scanDown 5.5s linear infinite;}
@keyframes scanDown{0%{top:-2px;opacity:0}4%{opacity:1}96%{opacity:.7}100%{top:100%;opacity:0}}

/* Center layout */
.center{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

/* ── TOP NAVBAR ── */
.navbar-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100; border-bottom: 1px solid var(--wire); background: rgba(3, 3, 3, 0.95); backdrop-filter: blur(10px);
}
.navbar {
  display: flex; justify-content: space-between; align-items: stretch;
  height: 60px; max-width: 1440px; margin: 0 auto; padding: 0 20px;
}
.nav-logo {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-d); font-size: 24px; letter-spacing: .06em; color: var(--cream);
  cursor: pointer;
}
.nav-logo span { color: var(--blue); }
.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--cream-3);
}
.status-dot {
  width: 6px; height: 6px; background: var(--green); border-radius: 50%;
  box-shadow: 0 0 6px var(--green); animation: statusPulse 1.6s infinite;
}
@keyframes statusPulse { 0%,100%{opacity:1;box-shadow:0 0 6px var(--green)} 50%{opacity:.3;box-shadow:none} }
.btn-back {
  font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  color: var(--blue); border: 1px solid var(--blue-dim); padding: 8px 16px; transition: all .2s;
  cursor: pointer;
}
.btn-back:hover { background: var(--blue-dim); color: var(--blue-hi); }

/* Login card */
.login-card{width:100%;max-width:440px;border:1px solid var(--wire);border-top:2px solid var(--blue);background:rgba(10,10,10,.96);backdrop-filter:blur(20px);animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-header{padding:24px 28px 0;border-bottom:1px solid var(--wire);}
.card-eyebrow{font-size:8.5px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.card-eyebrow::before{content:'//';opacity:.7;}
.card-title{font-family:var(--font-d);font-size:42px;line-height:.92;letter-spacing:.02em;color:var(--cream);margin-bottom:20px;}
.card-title span{color:var(--blue);}

.card-terminal{display:flex;align-items:center;gap:6px;padding:8px 0 16px;font-size:10px;color:var(--cream-3);}
.term-prompt{color:var(--blue);font-weight:700;}
.term-cmd{overflow:hidden;max-width:0;white-space:nowrap;animation:typing 1.8s steps(28) .5s forwards;}
@keyframes typing{to{max-width:260px}}
.term-cur{display:inline-block;width:7px;height:13px;background:var(--blue);vertical-align:middle;animation:blink .75s infinite 2.3s;opacity:0;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

.card-body{padding:24px 28px;}

.field{margin-bottom:20px;}
.field-label{display:block;font-size:8.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-3);margin-bottom:8px;}
.field-wrap{position:relative;border-bottom:1px solid var(--wire-2);display:flex;align-items:center;transition:border-color .2s;}
.field-wrap:focus-within{border-bottom-color:var(--blue);}
.field-input{flex:1;background:transparent;border:none;padding:10px 0;color:var(--cream);font-size:14px;font-family:var(--font-m);outline:none;min-height:44px;}
.field-input::placeholder{color:var(--cream-3);}
.field-icon{color:var(--cream-3);flex-shrink:0;margin-left:8px;}

.error-msg{display:none;font-size:10px;color:#FF5F57;letter-spacing:.1em;margin-top:6px;padding:8px 10px;border:1px solid rgba(255,95,87,.25);background:rgba(255,95,87,.06);}
.error-msg.show{display:block;}

.btn-login{width:100%;min-height:52px;background:var(--blue);color:#fff;font-family:var(--font-m);font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;border:none;cursor:pointer;transition:background .18s;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px;}
.btn-login:hover{background:var(--blue-hi);}
.btn-login:disabled{background:var(--wire-2);color:var(--cream-3);cursor:not-allowed;}
.btn-login svg{transition:transform .2s;}
.btn-login:hover svg{transform:translateX(4px);}

.card-footer{padding:14px 28px;border-top:1px solid var(--wire);background:var(--void-1);display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-3);}
.card-footer::before{content:'//';color:var(--cream-3);font-size:8px;font-weight:700;}

/* Corner decorations */
.corner{position:fixed;width:24px;height:24px;animation:cblink 2.8s ease-in-out infinite;}
.corner.tl{top:60px;left:12px;border-top:2px solid var(--blue);border-left:2px solid var(--blue);}
.corner.tr{top:60px;right:12px;border-top:2px solid var(--blue);border-right:2px solid var(--blue);animation-delay:.5s;}
.corner.bl{bottom:12px;left:12px;border-bottom:2px solid var(--blue);border-left:2px solid var(--blue);animation-delay:1s;}
.corner.br{bottom:12px;right:12px;border-bottom:2px solid var(--blue);border-right:2px solid var(--blue);animation-delay:1.5s;}
@keyframes cblink{0%,100%{opacity:.3}50%{opacity:1}}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;z-index:100;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s;}
.loading-overlay.show{opacity:1;pointer-events:all;}
.loading-bar-wrap{width:240px;height:2px;background:var(--wire);overflow:hidden;}
.loading-bar{height:100%;background:var(--blue);width:0;animation:none;}
.loading-bar.go{animation:loadBar .8s ease forwards;}
@keyframes loadBar{to{width:100%}}
.loading-text{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-3);}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grain"></div>
<div class="scan-line"></div>

<!-- Corners -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Top bar -->
<div class="navbar-wrapper">
  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='../index.html'"><img src="../assests/logos/text logo.png" alt="DEFFENSO" style="height:32px; width:auto; object-fit:contain;"> <span style="font-family:var(--font-m); font-size:12px; font-weight:700; letter-spacing:.2em;">LMS</span></div>
    <div class="nav-right">
      <div class="nav-status">
        <div class="status-dot"></div>
        PORTAL ONLINE
      </div>
      <button class="btn-back" onclick="window.location.href='../index.html'">← BACK TO SITE</button>
    </div>
  </nav>
</div>

<!-- Login card -->
<div class="center">
  <div class="login-card">
    <div class="card-header">
      <div class="card-eyebrow">SECURE ACCESS PORTAL</div>
      <h1 class="card-title">AGENT<br/><span>LOGIN.</span></h1>
      <div class="card-terminal">
        <span class="term-prompt">root@deffenso:~$</span>
        <span class="term-cmd">authenticate --clearance=STUDENT</span>
        <span class="term-cur"></span>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <label class="field-label" for="email">Agent Email</label>
        <div class="field-wrap">
          <input class="field-input" id="email" type="email" placeholder="agent@deffenso.com" autocomplete="email"/>
          <span class="field-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Access Code</label>
        <div class="field-wrap">
          <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button onclick="togglePwd()" style="background:none;border:none;cursor:pointer;color:var(--cream-3);padding:0;margin-left:8px;" id="eye-btn">
            <svg id="eye-icon" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="error-msg" id="error-msg">// AUTHENTICATION FAILED — CHECK CREDENTIALS</div>
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">
        AUTHENTICATE
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="card-footer">
      ENCRYPTED CHANNEL — DEFFENSO ACADEMY LMS v1.0
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.06em;color:var(--cream);">DEFFENSO LMS</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  <div class="loading-text" id="loading-text">AUTHENTICATING...</div>
</div>

<script>
/* ── Seed default users if none exist ── */
(function(){
  if(!localStorage.getItem('dflms_users')){
    const users=[
      {id:'u1',name:'Admin',email:'admin@deffenso.com',password:'admin123',role:'admin'},
      {id:'u2',name:'Student One',email:'student@deffenso.com',password:'student123',role:'student'}
    ];
    localStorage.setItem('dflms_users',JSON.stringify(users));
  }
  if(!localStorage.getItem('dflms_courses')) localStorage.setItem('dflms_courses',JSON.stringify([]));
  if(!localStorage.getItem('dflms_progress')) localStorage.setItem('dflms_progress',JSON.stringify({}));
})();

/* ── Matrix rain ── */
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  const COL_W=11;
  let drops,cols;
  function resize(){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    cols=Math.floor(canvas.width/COL_W)+2;
    drops=Array.from({length:cols},()=>Math.random()*(canvas.height/COL_W));
  }
  resize();window.addEventListener('resize',resize);
  setInterval(()=>{
    ctx.fillStyle='rgba(0,0,0,0.04)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font='bold 12px "IBM Plex Mono",monospace';
    for(let i=0;i<cols;i++){
      const bit=Math.random()>.5?'1':'0';
      const r=Math.random();
      if(r>.982)ctx.fillStyle='rgba(255,255,255,0.9)';
      else if(r>.91)ctx.fillStyle=`rgba(30,140,255,${(Math.random()*.35+.5).toFixed(2)})`;
      else if(r>.6)ctx.fillStyle=`rgba(0,123,255,${(Math.random()*.25+.28).toFixed(2)})`;
      else ctx.fillStyle=`rgba(0,70,180,${(Math.random()*.12+.1).toFixed(2)})`;
      ctx.fillText(bit,i*COL_W,drops[i]*COL_W);
      if(drops[i]*COL_W>canvas.height+20&&Math.random()>.965)drops[i]=-Math.random()*12;
      drops[i]+=0.52;
    }
  },55);
})();

/* ── Toggle password ── */
function togglePwd(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
}

/* ── Enter key ── */
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ── Login logic ── */
function doLogin(){
  const email=document.getElementById('email').value.trim().toLowerCase();
  const password=document.getElementById('password').value;
  const errEl=document.getElementById('error-msg');
  const btn=document.getElementById('login-btn');
  errEl.classList.remove('show');

  if(!email||!password){errEl.classList.add('show');return;}

  const users=JSON.parse(localStorage.getItem('dflms_users')||'[]');
  const user=users.find(u=>u.email.toLowerCase()===email&&u.password===password);

  if(!user){errEl.classList.add('show');document.getElementById('password').value='';return;}

  /* Store session */
  sessionStorage.setItem('dflms_session',JSON.stringify({id:user.id,name:user.name,email:user.email,role:user.role}));

  /* Show loading */
  const overlay=document.getElementById('loading-overlay');
  const bar=document.getElementById('loading-bar');
  const txt=document.getElementById('loading-text');
  overlay.classList.add('show');
  bar.classList.add('go');
  btn.disabled=true;

  const msgs=['AUTHENTICATING...','VERIFYING CLEARANCE...','LOADING SECURE MODULES...','ACCESS GRANTED'];
  let i=0;
  const iv=setInterval(()=>{
    txt.textContent=msgs[Math.min(i,msgs.length-1)];i++;
    if(i>msgs.length){
      clearInterval(iv);
      setTimeout(()=>{
        window.location.href=user.role==='admin'?'admin.html':'dashboard.html';
      },300);
    }
  },220);
}
</script>
</body>
</html>
