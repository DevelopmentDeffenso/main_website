<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEFFENSO LMS — DASHBOARD</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --void: #030303;
      --void-1: #0A0A0A;
      --void-2: #111111;
      --void-3: #1A1A1A;
      --cream: #E2D9C8;
      --cream-2: #A89E8D;
      --cream-3: #5A5249;
      --blue: #007BFF;
      --blue-hi: #3DA5FF;
      --blue-dim: rgba(0, 123, 255, 0.12);
      --green: #00FF41;
      --red: #FF4444;
      --yellow: #FEBC2E;
      --amber: #FF8C00;
      --wire: #1E1E1E;
      --wire-2: #2A2A2A;
      --font-d: 'Bebas Neue', sans-serif;
      --font-m: 'IBM Plex Mono', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--void);
      color: var(--cream);
      font-family: var(--font-m);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      font-family: inherit;
      color: inherit;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 2px;
    }

    ::-webkit-scrollbar-track {
      background: var(--void);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--blue);
    }

    /* ── NAVBAR ── */
    .navbar-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--wire);
      background: rgba(3, 3, 3, 0.95);
      backdrop-filter: blur(10px);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      height: 60px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      font-family: var(--font-d);
      font-size: 20px;
      letter-spacing: .06em;
      cursor: pointer;
      transition: background .2s;
      height: 100%;
      width: 100%;
    }

    .nav-logo:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .nav-logo span {
      color: var(--blue);
    }

    .nav-center {
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .nav-center::before {
      content: '//';
      color: var(--blue);
    }

    .nav-right {
      display: flex;
      align-items: stretch;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      border-left: 1px solid var(--wire);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .nav-user-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px var(--green)
      }

      50% {
        opacity: .3;
        box-shadow: none
      }
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--blue);
      border-left: 1px solid var(--wire);
      transition: all .2s;
      background: none;
      cursor: pointer;
    }

    .btn-logout:hover {
      background: var(--blue-dim);
      color: var(--blue-hi);
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    @media(max-width:768px) {
      .layout {
        flex-direction: column;
      }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: var(--void-1);
      border-right: 1px solid var(--wire);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      flex-shrink: 0;
    }

    .sidebar-header {
      height: 60px;
      border-bottom: 1px solid var(--wire);
      display: flex;
      align-items: center;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
    }

    @media(max-width:768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .sidebar-content {
        overflow-y: visible;
      }
    }

    .sidebar-section {
      padding: 20px 16px 8px;
    }

    .sidebar-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--cream-3);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-label::before {
      content: '[';
      opacity: .6;
    }

    .sidebar-label::after {
      content: ']';
      opacity: .6;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cream-3);
      border-radius: 0;
      transition: all .18s;
      width: 100%;
      border: none;
      background: none;
      cursor: pointer;
      text-align: left;
    }

    .sidebar-item:hover,
    .sidebar-item.active {
      color: var(--cream);
      background: rgba(0, 123, 255, .08);
      border-left: 2px solid var(--blue);
    }

    .sidebar-item svg {
      flex-shrink: 0;
      opacity: .6;
    }

    .sidebar-item:hover svg,
    .sidebar-item.active svg {
      opacity: 1;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--wire);
      margin: 8px 0;
    }

    /* Course list in sidebar */
    .sidebar-course {
      display: flex;
      flex-direction: column;
    }

    .sidebar-course-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 9px;
      letter-spacing: .1em;
      color: var(--cream-3);
      cursor: pointer;
      transition: all .18s;
      border-left: 2px solid transparent;
    }

    .sidebar-course-item:hover {
      color: var(--cream);
      border-left-color: var(--wire-2);
    }

    .sidebar-course-item.active {
      color: var(--blue);
      border-left-color: var(--blue);
      background: rgba(0, 123, 255, .05);
    }

    .sidebar-course-progress {
      font-size: 8px;
      margin-left: auto;
      color: var(--blue);
    }

    /* ── MAIN ── */
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .main {
      flex: 1;
    }

    /* Section header bar */
    .section-hdr {
      display: flex;
      align-items: center;
      height: 40px;
      gap: 10px;
      padding: 0 24px;
      background: var(--void-1);
      border-bottom: 1px solid var(--wire);
    }

    .shdr-id {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--blue);
      padding-right: 10px;
      border-right: 1px solid var(--wire);
    }

    .shdr-title {
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .shdr-right {
      margin-left: auto;
      font-size: 8.5px;
      letter-spacing: .12em;
      color: var(--cream-3);
    }

    /* Welcome strip */
    .welcome-strip {
      padding: 28px 28px 24px;
      border-bottom: 1px solid var(--wire);
      background: var(--void-1);
    }

    .welcome-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .welcome-h {
      font-family: var(--font-d);
      font-size: clamp(32px, 5vw, 52px);
      line-height: .92;
      letter-spacing: .02em;
      margin-bottom: 10px;
    }

    .welcome-h span {
      color: var(--blue);
    }

    .welcome-sub {
      font-size: 12px;
      color: var(--cream-3);
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--wire);
    }

    .stat-box {
      padding: 20px 24px;
      border-right: 1px solid var(--wire);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-box:last-child {
      border-right: none;
    }

    .stat-box-num {
      font-family: var(--font-d);
      font-size: 40px;
      color: var(--blue);
      line-height: 1;
    }

    .stat-box-label {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    /* Course grid */
    .course-grid {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--wire);
    }

    .course-card {
      background: var(--void);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
      cursor: pointer;
      transition: background .18s;
      position: relative;
      overflow: hidden;
    }

    .course-card:hover {
      background: var(--void-1);
    }

    .course-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s;
    }

    .course-card:hover::after {
      transform: scaleX(1);
    }

    .course-card-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      color: var(--cream-3);
      margin-bottom: 12px;
    }

    .course-card-num span {
      color: var(--blue);
    }

    .course-card-title {
      font-family: var(--font-d);
      font-size: 28px;
      line-height: .95;
      letter-spacing: .02em;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .course-card-desc {
      font-size: 11px;
      color: var(--cream-3);
      line-height: 1.65;
      margin-bottom: 16px;
      flex: 1;
    }

    .course-progress-wrap {
      margin-bottom: 14px;
    }

    .course-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 8.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--cream-3);
      margin-bottom: 6px;
    }

    .course-progress-bar {
      height: 2px;
      background: var(--wire-2);
      overflow: hidden;
    }

    .course-progress-fill {
      height: 100%;
      background: var(--blue);
      transition: width .6s ease;
    }

    .course-card-videos {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--wire);
      margin-top: 4px;
    }

    .video-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(30, 30, 30, .5);
      font-size: 10px;
      color: var(--cream-3);
      cursor: pointer;
      transition: color .15s;
    }

    .video-row:last-child {
      border-bottom: none;
    }

    .video-row:hover {
      color: var(--cream);
    }

    .video-row.locked {
      cursor: not-allowed;
      opacity: .4;
    }

    .video-row.locked:hover {
      color: var(--cream-3);
    }

    .video-row.completed .vi-status {
      color: var(--green);
    }

    .video-row.current .vi-num {
      color: var(--blue);
    }

    .vi-num {
      font-size: 8.5px;
      font-weight: 700;
      color: var(--cream-3);
      flex-shrink: 0;
      width: 20px;
    }

    .vi-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vi-status {
      flex-shrink: 0;
      font-size: 10px;
    }

    /* Empty state */
    .empty-state {
      padding: 80px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-state-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--wire-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream-3);
    }

    .empty-state-title {
      font-family: var(--font-d);
      font-size: 28px;
      letter-spacing: .02em;
      color: var(--cream-3);
    }

    .empty-state-sub {
      font-size: 12px;
      color: var(--cream-3);
      max-width: 280px;
      line-height: 1.65;
    }

    .no-courses {
      padding: 60px 24px;
      text-align: center;
    }

    /* ── PREMIUM QUIZ UI ── */
    .quiz-wrapper {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      margin: 40px auto 0;
    }

    .quiz-header {
      margin-bottom: 32px;
      animation: fadeDown .5s ease both;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quiz-eyebrow::before {
      content: '//';
      opacity: .6;
    }

    .quiz-title {
      font-family: var(--font-d);
      font-size: clamp(30px, 7vw, 58px);
      line-height: 1;
      letter-spacing: .02em;
      color: var(--cream);
      margin-bottom: 6px;
    }

    .quiz-title span {
      color: var(--blue);
    }

    .quiz-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .quiz-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1px solid var(--wire-2);
      color: var(--cream-3);
    }

    .quiz-badge.live {
      border-color: rgba(0, 123, 255, .3);
      color: var(--blue);
      position: relative;
    }

    .quiz-badge.live::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--blue);
      border-radius: 50%;
      margin-right: 7px;
      vertical-align: middle;
      animation: blink 1.3s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }

    .progress-wrap {
      margin-bottom: 28px;
      animation: fadeDown .5s .1s ease both;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    .progress-track {
      height: 3px;
      background: var(--wire-2);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--blue-hi));
      transition: width .5s cubic-bezier(.4, 0, .2, 1);
      width: 10%;
      position: relative;
    }

    .question-card {
      background: var(--void-1);
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      animation: cardIn .4s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--wire);
    }

    .q-num {
      font-family: var(--font-d);
      font-size: 28px;
      color: var(--blue);
      line-height: 1;
      flex-shrink: 0;
      min-width: 36px;
      opacity: .7;
    }

    .q-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.65;
      color: var(--cream);
      padding-top: 4px;
      font-family: var(--font-m);
    }

    .q-options {
      padding: 16px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--void);
      border: 1px solid var(--wire-2);
      border-radius: 0;
      color: var(--cream-2);
      font-family: var(--font-m);
      font-size: 11.5px;
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s, transform .1s;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: rgba(0, 123, 255, .08);
      transition: width .2s;
    }

    .option-btn:hover:not(:disabled)::before {
      width: 100%;
    }

    .option-btn:hover:not(:disabled) {
      border-color: rgba(0, 123, 255, .4);
      color: var(--cream);
    }

    .option-btn:active:not(:disabled) {
      transform: scale(.99);
    }

    .option-key {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 1px solid var(--wire-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--cream-3);
      transition: all .15s;
      position: relative;
      z-index: 1;
    }

    .option-btn:hover:not(:disabled) .option-key {
      border-color: var(--blue);
      color: var(--blue);
    }

    .option-label {
      position: relative;
      z-index: 1;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: .7;
    }

    .q-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      gap: 12px;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      font-family: var(--font-m);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      border: 1px solid var(--wire-2);
      background: var(--void-1);
      color: var(--cream-2);
      cursor: pointer;
      transition: all .15s;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: rgba(0, 123, 255, .4);
      color: var(--cream);
      background: rgba(0, 123, 255, .06);
    }

    .btn-nav.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .btn-nav.primary:hover:not(:disabled) {
      background: var(--blue-hi);
      border-color: var(--blue-hi);
      box-shadow: 0 0 20px rgba(0, 123, 255, .35);
    }

    .results-card {
      background: var(--void-1);
      border: 1px solid var(--wire);
      border-top: 2px solid var(--blue);
      padding: 36px 28px;
      text-align: center;
      display: none;
      animation: cardIn .5s ease both;
      margin-top: 24px;
    }

    .results-card.show {
      display: block;
    }

    .results-title {
      font-family: var(--font-d);
      font-size: clamp(36px, 8vw, 64px);
      color: var(--cream);
      margin-bottom: 6px;
      line-height: 1;
    }

    .results-score-txt {
      font-family: var(--font-d);
      font-size: clamp(60px, 14vw, 110px);
      color: var(--blue);
      line-height: .9;
      margin: 16px 0;
      text-shadow: 0 0 40px rgba(0, 123, 255, .4);
    }

    .results-sub {
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--cream-3);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .results-verdict {
      font-size: 13px;
      color: var(--cream-2);
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 28px;
      padding: 14px 18px;
      border: 1px solid var(--wire-2);
      border-left: 2px solid var(--blue);
      background: rgba(0, 123, 255, .04);
      text-align: left;
    }

    .verdict-tag {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .22em;
      color: var(--blue);

          START QUIZ

        </button>

    }

    function startQuiz(m) {
      activeModule = m;
      const PLAYLIST = getActivePlaylist();
      const QUESTIONS = PLAYLIST[m].quiz;
      current = 0; score = 0; userPicks = new Array(QUESTIONS.length).fill(null); answered = false;
      document.getElementById('results-card-' + m).classList.remove('show');

      const header = document.getElementById('quiz-header-' + m);
      if (header) header.style.display = 'block';
      const prog = document.getElementById('progress-wrap-' + m);
      if (prog) prog.style.display = '';

      renderQuestion();
    }

    function renderQuestion() {
      const m = activeModule;
      const PLAYLIST = getActivePlaylist();
      const QUESTIONS = PLAYLIST[m].quiz;
      answered = false; const q = QUESTIONS[current]; updateProgress();
      const container = document.getElementById('quiz-container-' + m); container.innerHTML = '';
      const card = document.createElement('div'); card.className = 'question-card';
      card.innerHTML = `<div class="q-header"><div class="q-num">${String(current + 1).padStart(2, '0')}</div><div class="q-text">${q.question}</div></div>`;
      const opts = document.createElement('div'); opts.className = 'q-options';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button'); btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-key">${LABELS[i]}</span><span class="option-label">${opt}</span>`;
        btn.onclick = () => selectAnswer(i, card, q); opts.appendChild(btn);
      });
      card.appendChild(opts);
      const nav = document.createElement('div'); nav.className = 'q-nav'; nav.style.cssText = 'padding:0 22px 20px;';
      nav.innerHTML = `<div style="font-size:9px;letter-spacing:.14em;color:var(--cream-3);text-transform:uppercase">${current + 1} / ${QUESTIONS.length}</div>
    <button class="btn-nav primary" id="next-btn" onclick="nextQuestion()" style="display:none">${current < QUESTIONS.length - 1 ? 'NEXT QUESTION' : 'SEE RESULTS'}</button>`;
      card.appendChild(nav); container.appendChild(card);
    }

    function selectAnswer(idx, card, q) {
      if (answered) return; answered = true; userPicks[current] = idx; if (idx === q.correct) score++;
      card.querySelectorAll('.option-btn').forEach((b, i) => {
        b.disabled = true;
        if (i === idx) {
          b.style.borderColor = 'rgba(0,123,255,.6)'; b.style.background = 'rgba(0,123,255,.1)'; b.style.color = 'var(--cream)';
          b.querySelector('.option-key').style.borderColor = 'var(--blue)'; b.querySelector('.option-key').style.color = 'var(--blue)';
        } else { b.style.opacity = '.35'; }
      });
      document.getElementById('next-btn').style.display = 'inline-flex'; updateProgress();
    }

    function nextQuestion() {
      const m = activeModule;
      const PLAYLIST = getActivePlaylist();
      const QUESTIONS = PLAYLIST[m].quiz;
      if (current < QUESTIONS.length - 1) { current++; renderQuestion(); } else { showResults(); }
    }

    function updateProgress() {
      const m = activeModule;
      const PLAYLIST = getActivePlaylist();
      const QUESTIONS = PLAYLIST[m].quiz;
      document.getElementById('progress-fill-' + m).style.width = Math.max(((current) / QUESTIONS.length) * 100, 5) + '%';
      document.getElementById('progress-label-' + m).textContent = `QUESTION ${current + 1} / ${QUESTIONS.length}`;
    }

    function showResults() {
      const m = activeModule;
      const PLAYLIST = getActivePlaylist();
      const QUESTIONS = PLAYLIST[m].quiz;
      document.getElementById('quiz-container-' + m).innerHTML = '';
      const pwrap = document.getElementById('progress-wrap-' + m);
      if (pwrap) pwrap.style.display = 'none';

      const PASS_COUNT = Math.ceil(QUESTIONS.length * 0.8);
      const passed = score >= PASS_COUNT;
      const pct = Math.round((score / QUESTIONS.length) * 100);

      document.getElementById('results-score-' + m).textContent = `${score}/${QUESTIONS.length}`;
      document.getElementById('results-score-' + m).style.color = passed ? 'var(--green)' : 'var(--red)';
      document.getElementById('results-pct-' + m).textContent = `${pct}% ACCURACY`;
      document.getElementById('results-title-' + m).textContent = passed ? 'CLEARED' : 'FAILED';
      document.getElementById('results-card-' + m).style.borderTopColor = passed ? 'var(--green)' : 'var(--red)';

      const banner = document.getElementById('unlock-banner-' + m);
      if (passed) {
        banner.className = 'unlock-banner pass'; banner.innerHTML = `<span class="ub-icon"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg></span><span class="ub-label">// ACCESS GRANTED</span>Score: ${score}/${QUESTIONS.length}. Next class unlocked. You are cleared to proceed.`;
        
        if (window.activeCourseVideo) {
          const vId = window.activeCourseVideo.id;
          saveProgressSync(vId, { quizPassed: true, watched: true });
          renderSidebar();
        } else {
          // Record module progress
          const recVideoId = PLAYLIST[m].video;
          saveProgressSync(recVideoId, { quizPassed: true, watched: true });
        }
          // Unlock strictly the next module:
          const nextM = m + 1;
          const PLAYLIST_NEXT = getActivePlaylist();
          const nc = document.getElementById('mod-' + nextM);
          if (nc && nextM < PLAYLIST_NEXT.length) {
            nc.style.borderColor = 'var(--green)'; nc.style.borderTopColor = 'var(--green)';
            const e = document.getElementById('nc-eyebrow-' + nextM); if (e) { e.textContent = '[UNLOCKED] NEXT SESSION'; e.style.color = 'var(--green)'; }
            const o = document.getElementById('nc-overlay-' + nextM); if (o) o.style.display = 'none';
            const w = document.getElementById('nc-iframe-wrap-' + nextM); if (w) w.style.cssText = 'position:relative;padding-bottom:56.25%;height:0;overflow:hidden; pointer-events:auto; opacity:1; filter:none; transition:all 0.5s ease;';
          }
      } else {
        banner.className = 'unlock-banner fail'; banner.innerHTML = `<span class="ub-icon"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></span><span class="ub-label">// ACCESS DENIED</span>Score: ${score}/${QUESTIONS.length}. You need at least 80% to unlock the next class.`;
      }

      document.getElementById('verdict-text-' + m).textContent = score === QUESTIONS.length ? 'Outstanding. Perfect score — you have mastered the fundamentals. Proceed to the next module immediately.' : passed ? `Strong performance. ${QUESTIONS.length - score} question(s) missed — review the flagged answers below.` : `Below threshold. You missed ${QUESTIONS.length - score} question(s). Retry this quiz before proceeding.`;

      const reviewList = document.getElementById('review-list-' + m);
      const wrongOnes = QUESTIONS.filter((q, i) => userPicks[i] !== q.correct);
      if (wrongOnes.length === 0) {
        reviewList.innerHTML = `<div style="font-size:9px;letter-spacing:.22em;color:var(--green);text-transform:uppercase;padding:16px 0;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> ALL ANSWERS CORRECT</div>`;
      } else {
        reviewList.innerHTML = `<div style="font-size:9px;letter-spacing:.22em;color:var(--red);text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--wire)">// INCORRECT ANSWERS — ${wrongOnes.length} MISTAKE${wrongOnes.length > 1 ? 'S' : ''}</div>`;
        QUESTIONS.forEach((q, i) => {
          const picked = userPicks[i]; if (picked === q.correct) return;
          const yourAnswer = picked !== null ? `${LABELS[picked]}) ${q.options[picked]}` : 'No answer';
          reviewList.innerHTML += `<div class="review-item" style="border-color:rgba(255,95,87,.25); border-left:2px solid var(--red);">
        <div style="flex:1;min-width:0"><span class="review-q" style="margin-bottom:8px">Q${i + 1}: ${q.question}</span>
        <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px"><span style="font-size:10px;color:var(--red);display:flex;align-items:center;gap:6px;"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> Your answer: &nbsp;<strong>${yourAnswer}</strong></span></div></div></div>`;
        });
      }
      document.getElementById('results-card-' + m).classList.add('show');

      const btnNext = document.getElementById('btn-next-class-' + m);
      if (btnNext) {
        if (passed && m < RECORDED_MODULES.length - 1) {
          btnNext.style.display = 'inline-flex';
        } else {
          btnNext.style.display = 'none';
        }
      }
      document.getElementById('results-card-' + m).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Render sidebar course list ── */
    /* ── Sidebar: Assigned Courses ── */
    function renderSidebar() {
      const courses = getCourses();
      const cont = document.getElementById('sidebar-courses');
      if (!cont) return;

      if (!courses.length) {
        cont.innerHTML = '<div style="padding:16px; font-size:9px; color:var(--cream-3); text-transform:uppercase; border:1px dashed var(--wire);">No tracks assigned</div>';
        return;
      }

      cont.innerHTML = courses.map(c => {
        const { done, total } = courseProgress(c);
        return `
          <div class="sidebar-course-item" onclick="scrollToCourse('${c.id}')">
            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;">${c.title}</span>
            <span class="sidebar-course-progress">${done}/${total}</span>
          </div>`;
      }).join('');
    }

    /* ── Overall stats ── */
    function renderStats() {
      const courses = getCourses();
      const p = getProgressSync();
      let watchedVideos = 0, passedQuizzes = 0, totalVideos = 0;
      
      // Curriculum progress
      courses.forEach(c => {
        (c.videos || []).forEach(v => {
          totalVideos++;
          if (p[v.id]?.watched || p[userKey(v.id)]?.watched) watchedVideos++;
          if (p[v.id]?.quizPassed || p[userKey(v.id)]?.quizPassed) passedQuizzes++;
        });
      });

      // Archive progress
      RECORDED_MODULES.forEach((rec, i) => {
        totalVideos++;
        if (isQuizPassed(rec.video)) {
          passedQuizzes++;
          watchedVideos++;
        }
      });

      return { courses: courses.length, watchedVideos, passedQuizzes, totalVideos };
    }

    /* ── View: Courses ── */

      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      const navIndex = view === 'progress' ? 0 : 1;
      document.querySelectorAll('.sidebar-item')[navIndex]?.classList.add('active');

      const courses = getCourses();
      const stats = renderStats();
      const main = document.getElementById('main-content');
      if (view === 'progress') {
        // Progress view
        main.innerHTML = `
      <div class="section-hdr"><span class="shdr-id">[PRG]</span><span class="shdr-title">MY PROGRESS</span><span class="shdr-right">LEARNING TRACKER</span></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:20px;">
          ${RECORDED_MODULES.map((rec, i) => {
            const passed = isQuizPassed(rec.video);
            const prevPassed = i === 0 || isQuizPassed(RECORDED_MODULES[i-1].video);
            const jumpToIdx = `showView('recorded', false); setTimeout(() => { if(window.switchRecVideo) { window.currentRecVideo = ${i}; window.switchRecVideo(0); } }, 100)`;
            return `<div ${prevPassed ? `onclick="${jumpToIdx}"` : ''} style="padding:16px;border:1px solid var(--wire);border-left:2px solid ${passed ? 'var(--green)' : 'var(--amber)'};background:var(--void-1);cursor:${prevPassed?'pointer':'not-allowed'};opacity:${prevPassed?1:0.5};">
              <div style="font-size:8px;color:var(--cream-3);margin-bottom:4px;">SESSION 0${i+1}</div>
              <div style="font-size:12px;font-weight:500;margin-bottom:10px;text-transform:uppercase;">${rec.title}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:8px;font-weight:700;padding:2px 6px;background:${passed?'var(--green)':'var(--void-2)'};color:${passed?'#000':'var(--cream-3)'};">${passed?'COMPLETED':'PENDING'}</span>
                ${!passed && prevPassed ? '<span style="font-size:8px;color:var(--amber);">READY TO START →</span>' : ''}

      } else if (view === 'recorded') {

           <button class="btn-nav" id="btn-prev-rec" onclick="switchRecVideo(-1)" disabled>&larr; PREVIOUS</button>
           <button class="btn-nav primary" id="btn-next-rec" onclick="switchRecVideo(1)">NEXT SESSION &rarr;</button>
        </div>

                  <div class="results-verdict" id="results-verdict-${i}">
                    <span class="verdict-tag">// DEBRIEF</span><span id="verdict-text-${i}"></span>
                  </div>
                  <div class="review-list" id="review-list-${i}"></div>
                  <br/>
                  <div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap">
                    <button class="btn-restart" onclick="startQuiz(${i})">
                      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                      RETRY QUIZ
                    </button>
                    ${i < PLAYLIST.length - 1 ? `
                    <button class="btn-next" id="btn-next-class-${i}" onclick="switchRecVideo(1); window.scrollTo({top:0, behavior:'smooth'});" style="display:none">
                      PROCEED TO NEXT MODULE
                      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>` : (!isArchive ? `<button class="btn-next" style="background:var(--green); color:#000; display:none" id="btn-next-class-${i}" onclick="showView('courses')">COURSE COMPLETE — GO BACK</button>` : '')}
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;

        PLAYLIST.forEach((mod, i) => { setTimeout(() => renderStartScreen(i), 0); });

        setTimeout(() => {
          const nav = document.getElementById('rec-nav-controls');
          if (nav && isArchive) nav.style.display = 'flex';

          if (!window.switchRecVideo) {
            window.currentRecVideo = 0;
            window.switchRecVideo = function (dir) {
              const LIST = getActivePlaylist();
              window.currentRecVideo += dir;
              if (window.currentRecVideo < 0) window.currentRecVideo = 0;
              if (window.currentRecVideo >= LIST.length) window.currentRecVideo = LIST.length - 1;

              LIST.forEach((mod, idx) => {
                const el = document.getElementById('mod-' + idx);
                if (el) el.style.display = (window.currentRecVideo === idx) ? 'block' : 'none';
              });

              const prevB = document.getElementById('btn-prev-rec');
              const nextB = document.getElementById('btn-next-rec');
              if (prevB) prevB.disabled = (window.currentRecVideo === 0);
              if (nextB) nextB.disabled = (window.currentRecVideo === LIST.length - 1);
            };
          }

          window.switchRecVideo(0);

          // Setup unlock states for archive
          if (isArchive) {
            RECORDED_MODULES.forEach((mod, idx) => {
              if (idx > 0 && isQuizPassed(RECORDED_MODULES[idx - 1].video)) {
                const nc = document.getElementById('mod-' + idx);
                if (nc) {
                  nc.style.borderColor = 'var(--green)'; nc.style.borderTopColor = 'var(--green)';
                  const e = document.getElementById('nc-eyebrow-' + idx); if (e) { e.textContent = '[UNLOCKED] NEXT SESSION'; e.style.color = 'var(--green)'; }
                  const o = document.getElementById('nc-overlay-' + idx); if (o) o.style.display = 'none';
                  const w = document.getElementById('nc-iframe-wrap-' + idx); if (w) w.style.cssText = 'position:relative;padding-bottom:56.25%;height:0;overflow:hidden; pointer-events:auto; opacity:1; filter:none; transition:all 0.5s ease;';
                }
              }
            });
          }
        }, 50);
      }
    }

    /* ── Render course cards ── */
    function renderCourseList(courses) {
      const el = document.getElementById('course-list');
      if (!el) return;
      el.innerHTML = courses.map(course => {
        const { done, total, pct } = courseProgress(course);
        const videos = course.videos || [];
        const videoRows = videos.map((v, i) => {
          const unlocked = isUnlocked(course, i);
          const passed = isQuizPassed(v.id);
          const watched = isWatched(v.id);
          let cls = 'video-row';
          if (!unlocked) cls += ' locked';
          if (passed) cls += ' completed';
          const onclick = unlocked ? `openVideo('${course.id}','${v.id}')` : '';
          return `<div class="${cls}" ${onclick ? `onclick="${onclick}"` : ''}
        title="${unlocked ? v.title : 'Complete previous quiz to unlock'}">
        <span class="vi-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="vi-title">${v.title}</span>
        <span class="vi-status" style="${passed ? 'color:var(--green)' : watched ? 'color:var(--blue)' : ''}">
          ${passed 
            ? '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="filter: drop-shadow(0 0 4px var(--green))"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' 
            : watched 
              ? '<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>' 
              : unlocked 
                ? '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>' 
                : '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="opacity:0.3"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>'}
        </span>
      </div>`;
        }).join('');

        return `<div id="course-${course.id}" style="border:1px solid var(--wire);border-top:2px solid var(--blue);">
      <div style="padding:20px 20px 14px;border-bottom:1px solid var(--wire);background:var(--void-1);">

        <div style="font-family:var(--font-d);font-size:28px;line-height:.95;letter-spacing:.02em;color:var(--cream);margin-bottom:6px;">${course.title}</div>
        <div style="font-size:11px;color:var(--cream-3);margin-bottom:14px;">${course.description || ''}</div>
        <div style="display:flex;justify-content:space-between;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-3);margin-bottom:6px;">
          <span>${done}/${total} complete</span><span>${pct}%</span>
        </div>
        <div style="height:2px;background:var(--wire-2);"><div style="height:100%;background:var(--blue);width:${pct}%;"></div></div>
      </div>
      <div style="padding:0 20px;">${videoRows || '<div style="padding:16px 0;font-size:10px;color:var(--cream-3);">No videos added yet.</div>'}</div>
    </div>`;
      }).join('');
    }

    function scrollToCourse(id) {
      showView('courses');
      setTimeout(() => {
        const el = document.getElementById('course-' + id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function openVideo(courseId, videoId) {
      // Find the specific video from course
      const courses = getCourses();
      const course = courses.find(c => c.id === courseId);
      if (!course) return;
      const video = course.videos.find(v => v.id === videoId);
      if (!video) return;

      // Inject this video into our "Current Classroom" session
      window.activeCourseVideo = {
        title: video.title,
        moduleTitle: course.title,
        video: video.youtubeUrl.split('v=')[1] || video.youtubeUrl.split('/').pop(),
        quiz: video.quiz || [],
        id: video.id,
        isCourse: true
      };

      showView('recorded', false);
    }

    /* ── Init ── */
    async function init() {
      try {
        // 1. Wait for Auth to be ready
        await window.DataManager.waitForAuth();
        
        // 2. Load courses from Firebase
        CACHED_COURSES = await window.DataManager.getCourses();
        
        // 3. Load progress from Firebase
        CACHED_PROGRESS = await window.DataManager.getProgress();
        
        // 4. Render UI
        document.getElementById('nav-name').textContent = (user.name || user.email || 'AGENT').toUpperCase();
        showView('recorded');
      } catch (err) {
        console.error('Init Error:', err);
        document.getElementById('nav-name').textContent = (user.name || user.email || 'AGENT').toUpperCase();
        showView('recorded');
      }
    }
    init();
  </script>
</body>

</html>
