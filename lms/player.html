<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DEFFENSO LMS — PLAYER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#030303;--void-1:#0A0A0A;--void-2:#111111;--void-3:#1A1A1A;
  --cream:#E2D9C8;--cream-2:#A89E8D;--cream-3:#5A5249;
  --blue:#007BFF;--blue-hi:#3DA5FF;--blue-dim:rgba(0,123,255,0.12);
  --green:#00FF41;--red:#FF4444;--wire:#1E1E1E;--wire-2:#2A2A2A;
  --font-d:'Bebas Neue',sans-serif;--font-m:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--void);color:var(--cream);font-family:var(--font-m);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;}
button{border:none;background:none;font-family:inherit;color:inherit;cursor:pointer;}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-track{background:var(--void);}::-webkit-scrollbar-thumb{background:var(--blue);}

/* Navbar */
.navbar{height:52px;background:rgba(3,3,3,.97);border-bottom:1px solid var(--wire);display:flex;align-items:stretch;position:sticky;top:0;z-index:50;}
.nav-logo{display:flex;align-items:center;padding:0 20px;gap:10px;border-right:1px solid var(--wire);font-family:var(--font-d);font-size:20px;letter-spacing:.06em;}
.nav-logo span{color:var(--blue);}
.nav-back{display:flex;align-items:center;gap:8px;padding:0 20px;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-3);border-right:1px solid var(--wire);transition:color .18s;cursor:pointer;}
.nav-back:hover{color:var(--cream);}
.nav-breadcrumb{flex:1;display:flex;align-items:center;padding:0 20px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-3);gap:8px;}
.nav-breadcrumb span{color:var(--blue);}

/* Layout */
.player-layout{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 52px);}
@media(max-width:900px){.player-layout{grid-template-columns:1fr;}}

/* Video side */
.video-side{display:flex;flex-direction:column;}

/* Video container */
.video-wrap{position:relative;background:#000;aspect-ratio:16/9;width:100%;}
.video-wrap iframe{width:100%;height:100%;border:none;}

/* Section header */
.section-hdr{display:flex;align-items:center;height:40px;gap:10px;padding:0 20px;background:var(--void-1);border-bottom:1px solid var(--wire);}
.shdr-id{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);padding-right:10px;border-right:1px solid var(--wire);}
.shdr-title{font-size:8.5px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-3);}
.shdr-right{margin-left:auto;font-size:8.5px;letter-spacing:.12em;color:var(--cream-3);}

/* Video info */
.video-info{padding:20px 24px;border-bottom:1px solid var(--wire);}
.video-title{font-family:var(--font-d);font-size:32px;line-height:.95;letter-spacing:.02em;margin-bottom:8px;}
.video-meta{display:flex;align-items:center;gap:16px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-3);}
.video-meta-badge{padding:3px 8px;border:1px solid rgba(0,123,255,.3);color:var(--blue);font-size:8px;font-weight:700;letter-spacing:.16em;}

/* Quiz panel gate */
.quiz-gate{padding:20px 24px;border-bottom:1px solid var(--wire);}
.quiz-gate-msg{display:flex;align-items:center;gap:10px;padding:14px 16px;border:1px solid var(--wire);background:var(--void-1);margin-bottom:14px;font-size:10px;color:var(--cream-3);}
.quiz-gate-msg.passed{border-color:rgba(0,255,65,.3);background:rgba(0,255,65,.04);color:var(--green);}
.btn-take-quiz{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:48px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;transition:background .18s;}
.btn-take-quiz:hover{background:var(--blue-hi);}
.btn-take-quiz:disabled{background:var(--wire-2);color:var(--cream-3);cursor:not-allowed;}

/* Sidebar playlist */
.playlist-side{border-left:1px solid var(--wire);background:var(--void-1);display:flex;flex-direction:column;}
.playlist-header{padding:14px 16px;border-bottom:1px solid var(--wire);font-size:8.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);}
.playlist-scroll{flex:1;overflow-y:auto;}
.playlist-item{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(30,30,30,.6);cursor:pointer;transition:background .15s;position:relative;}
.playlist-item:hover{background:rgba(0,123,255,.04);}
.playlist-item.active{background:rgba(0,123,255,.08);border-left:2px solid var(--blue);}
.playlist-item.locked{cursor:not-allowed;opacity:.4;}
.pi-num{font-family:var(--font-d);font-size:28px;color:var(--wire-2);line-height:1;flex-shrink:0;transition:color .18s;}
.playlist-item.active .pi-num,.playlist-item:hover .pi-num{color:var(--blue);}
.pi-info{flex:1;min-width:0;}
.pi-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-status{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;}
.pi-status.passed{color:var(--green);}
.pi-status.current{color:var(--blue);}
.pi-status.locked{color:var(--cream-3);}

/* ── QUIZ OVERLAY ── */
.quiz-overlay{position:fixed;inset:0;z-index:200;background:rgba(3,3,3,.96);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.quiz-overlay.open{opacity:1;pointer-events:all;}
.quiz-card{width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border:1px solid var(--wire);border-top:2px solid var(--blue);background:var(--void-1);}
.quiz-card-header{padding:20px 24px;border-bottom:1px solid var(--wire);display:flex;align-items:center;justify-content:space-between;}
.quiz-card-title{font-family:var(--font-d);font-size:28px;line-height:1;letter-spacing:.02em;}
.quiz-card-meta{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);}
.quiz-progress-bar{height:2px;background:var(--wire-2);}
.quiz-progress-fill{height:100%;background:var(--blue);transition:width .3s;}
.quiz-body{padding:24px;}

.question-block{display:none;}
.question-block.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-counter{font-size:8.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;}
.q-text{font-size:13px;color:var(--cream);line-height:1.7;margin-bottom:20px;}
.options{display:flex;flex-direction:column;gap:8px;}
.option-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--wire-2);background:transparent;text-align:left;font-size:12px;color:var(--cream-2);transition:all .18s;cursor:pointer;width:100%;}
.option-btn:hover{border-color:var(--blue);color:var(--cream);background:var(--blue-dim);}
.option-btn.selected{border-color:var(--blue);background:var(--blue-dim);color:var(--cream);}
.option-btn.correct{border-color:var(--green);background:rgba(0,255,65,.08);color:var(--green);}
.option-btn.wrong{border-color:var(--red);background:rgba(255,68,68,.08);color:var(--red);}
.option-label{width:24px;height:24px;border:1px solid var(--wire-2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.option-btn.selected .option-label,.option-btn.correct .option-label{background:var(--blue);border-color:var(--blue);color:#fff;}
.option-btn.correct .option-label{background:var(--green);border-color:var(--green);color:#000;}
.option-btn.wrong .option-label{background:var(--red);border-color:var(--red);color:#fff;}

.quiz-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--wire);margin-top:8px;}
.btn-next{display:flex;align-items:center;gap:8px;padding:0 24px;min-height:44px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;transition:background .18s;}
.btn-next:hover{background:var(--blue-hi);}
.btn-next:disabled{background:var(--wire-2);color:var(--cream-3);cursor:not-allowed;}

/* Results screen */
.quiz-result{padding:32px 24px;text-align:center;}
.result-score{font-family:var(--font-d);font-size:80px;line-height:1;letter-spacing:.02em;margin-bottom:8px;}
.result-score.pass{color:var(--green);}
.result-score.fail{color:var(--red);}
.result-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;}
.result-label.pass{color:var(--green);}
.result-label.fail{color:var(--red);}
.result-sub{font-size:12px;color:var(--cream-3);max-width:380px;margin:0 auto 28px;line-height:1.75;}
.result-breakdown{display:flex;justify-content:center;gap:24px;margin-bottom:28px;}
.rb-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.rb-num{font-family:var(--font-d);font-size:40px;line-height:1;}
.rb-num.green{color:var(--green);}
.rb-num.red{color:var(--red);}
.rb-label{font-size:8.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-3);}
.btn-retry{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:280px;margin:0 auto;min-height:48px;border:1px solid var(--wire-2);color:var(--cream-2);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;transition:all .18s;}
.btn-retry:hover{border-color:var(--blue);color:var(--cream);}
.btn-next-lesson{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:280px;margin:0 auto 10px;min-height:48px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;transition:background .18s;}
.btn-next-lesson:hover{background:var(--blue-hi);}
</style>
</head>
<body>

<script>
const sess=sessionStorage.getItem('dflms_session');
if(!sess){window.location.href='index.html';}
const user=JSON.parse(sess||'{}');
const ctx=JSON.parse(sessionStorage.getItem('dflms_player')||'{}');
if(!ctx.courseId||!ctx.videoId){window.location.href='dashboard.html';}
</script>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-logo"><img src="../assests/logos/text logo.png" alt="DEFFENSO" style="height:32px; width:auto; object-fit:contain;"> <span style="font-family:var(--font-m); font-size:12px; font-weight:700; letter-spacing:.2em;">LMS</span></div>
  <button class="nav-back" onclick="window.location.href='dashboard.html'">
    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5M12 19l-7-7 7-7"/></svg>
    BACK
  </button>
  <div class="nav-breadcrumb" id="breadcrumb">
    <span id="bc-course">COURSE</span>
    <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 18l6-6-6-6"/></svg>
    <span id="bc-video">VIDEO</span>
  </div>
</nav>

<div class="player-layout">
  <!-- Left: video + quiz gate -->
  <div class="video-side">
    <div class="section-hdr">
      <span class="shdr-id">[VID]</span>
      <span class="shdr-title" id="hdr-title">LOADING...</span>
      <span class="shdr-right" id="hdr-meta"></span>
    </div>

    <div class="video-wrap" id="video-wrap">
      <iframe id="yt-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="video-info">
      <h1 class="video-title" id="video-title">–</h1>
      <div class="video-meta">
        <div class="video-meta-badge" id="video-badge">LOADING</div>
        <span id="video-meta-txt"></span>
      </div>
    </div>

    <div class="section-hdr">
      <span class="shdr-id">[QUZ]</span>
      <span class="shdr-title">KNOWLEDGE CHECK</span>
      <span class="shdr-right" id="quiz-meta-hdr">10 QUESTIONS</span>
    </div>

    <div class="quiz-gate" id="quiz-gate-area"></div>
  </div>

  <!-- Right: playlist -->
  <aside class="playlist-side">
    <div class="playlist-header">// LESSON PLAYLIST</div>
    <div class="playlist-scroll" id="playlist"></div>
  </aside>
</div>

<!-- ── Quiz overlay ── -->
<div class="quiz-overlay" id="quiz-overlay">
  <div class="quiz-card">
    <div class="quiz-card-header">
      <div>
        <div class="quiz-card-meta" id="quiz-overlay-meta">QUIZ</div>
        <div class="quiz-card-title" id="quiz-overlay-title">KNOWLEDGE CHECK</div>
      </div>
      <button onclick="closeQuiz()" style="color:var(--cream-3);font-size:18px;padding:4px 8px;">✕</button>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog-fill" style="width:0%"></div></div>
    <div class="quiz-body" id="quiz-body"></div>
    <div class="quiz-nav">
      <span id="q-counter-nav" style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-3);">Q 1 OF 10</span>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>
        NEXT
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
/* ── Data helpers ── */
function getCourses(){return JSON.parse(localStorage.getItem('dflms_courses')||'[]');}
function getProgress(){return JSON.parse(localStorage.getItem('dflms_progress')||'{}');}
function saveProgress(p){localStorage.setItem('dflms_progress',JSON.stringify(p));}
function userKey(videoId){return `${user.id}_${videoId}`;}
function isQuizPassed(videoId){const p=getProgress();return !!(p[userKey(videoId)]?.quizPassed);}
function isUnlocked(course,videoIndex){
  if(videoIndex===0)return true;
  const prev=course.videos[videoIndex-1];
  if(!prev.quiz||!prev.quiz.length)return isWatched(prev.id);
  return isQuizPassed(prev.id);
}
function markWatched(videoId){
  const p=getProgress();
  if(!p[userKey(videoId)])p[userKey(videoId)]={};
  p[userKey(videoId)].watched=true;
  saveProgress(p);
}
function markQuizPassed(videoId,score){
  const p=getProgress();
  if(!p[userKey(videoId)])p[userKey(videoId)]={};
  p[userKey(videoId)].watched=true;
  p[userKey(videoId)].quizPassed=true;
  p[userKey(videoId)].score=score;
  saveProgress(p);
}
function isWatched(videoId){
  const p=getProgress();
  return !!(p[userKey(videoId)]?.watched);
}

/* ── Extract YouTube embed ID ── */
function ytEmbedUrl(url){
  if(!url)return '';
  let id='';
  try{
    const u=new URL(url);
    if(u.hostname.includes('youtu.be'))id=u.pathname.slice(1);
    else if(u.searchParams.get('v'))id=u.searchParams.get('v');
    else{const m=u.pathname.match(/embed\/([^/?]+)/);if(m)id=m[1];}
  }catch(e){const m=url.match(/(?:v=|youtu\.be\/|embed\/)([^&?\/]+)/);if(m)id=m[1];}
  return id?`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`:'';
}

/* ── State ── */
let course=null,video=null,videoIndex=0;
let quizQuestions=[],currentQ=0,answers=[],quizAnswered=false;

/* ── Init ── */
function init(){
  const courses=getCourses();
  course=courses.find(c=>c.id===ctx.courseId);
  if(!course){window.location.href='dashboard.html';return;}
  videoIndex=course.videos.findIndex(v=>v.id===ctx.videoId);
  if(videoIndex<0){window.location.href='dashboard.html';return;}
  video=course.videos[videoIndex];

  // Check access
  if(!isUnlocked(course,videoIndex)){window.location.href='dashboard.html';return;}

  // Mark watched
  markWatched(video.id);

  // Render
  document.getElementById('bc-course').textContent=course.title.toUpperCase();
  document.getElementById('bc-video').textContent=video.title.toUpperCase();
  document.getElementById('hdr-title').textContent=video.title.toUpperCase();
  document.getElementById('hdr-meta').textContent=`LESSON ${videoIndex+1} OF ${course.videos.length}`;
  document.getElementById('video-title').textContent=video.title;
  document.getElementById('video-badge').textContent=`LESSON ${String(videoIndex+1).padStart(2,'0')}`;
  document.getElementById('video-meta-txt').textContent=`${course.title} · ${course.videos.length} lessons total`;

  // YouTube embed
  const embedUrl=ytEmbedUrl(video.youtubeUrl||'');
  if(embedUrl){
    document.getElementById('yt-frame').src=embedUrl;
  } else {
    document.getElementById('video-wrap').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:300px;background:var(--void-1);border-bottom:1px solid var(--wire);flex-direction:column;gap:12px;color:var(--cream-3);">
      <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
      <div style="font-size:10px;letter-spacing:.16em;text-transform:uppercase;">NO VIDEO URL SET</div>
    </div>`;
  }

  renderPlaylist();
  renderQuizGate();
}

/* ── Playlist ── */
function renderPlaylist(){
  const el=document.getElementById('playlist');
  el.innerHTML=course.videos.map((v,i)=>{
    const unlocked=isUnlocked(course,i);
    const icon = passed 
      ? '<svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' 
      : watched 
        ? '<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>' 
        : unlocked && isActive 
          ? '<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'
          : unlocked 
            ? '<svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>'
            : '<svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>';

    return `<div class="playlist-item${isActive?' active':''}${!unlocked?' locked':''}" ${onclick?`onclick="${onclick}"`:''}
      title="${unlocked?v.title:'Complete previous quiz to unlock'}">
      <div class="pi-num">${String(i+1).padStart(2,'0')}</div>
      <div class="pi-info">
        <div class="pi-title">${v.title}</div>
        <div style="display:flex; align-items:center; gap:6px;" class="pi-status ${statusCls}">${icon} ${statusTxt}</div>
      </div>
    </div>`;
  }).join('');
}

function switchVideo(videoId){
  sessionStorage.setItem('dflms_player',JSON.stringify({courseId:course.id,videoId}));
  window.location.reload();
}

/* ── Quiz gate ── */
function renderQuizGate(){
  const el=document.getElementById('quiz-gate-area');
  const quiz=video.quiz||[];
  const passed=isQuizPassed(video.id);
  const hasNextVideo=videoIndex<course.videos.length-1;

  if(!quiz.length){
    el.innerHTML=`<div class="quiz-gate-msg"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>No quiz attached to this lesson yet.</div>
      ${hasNextVideo?`<button class="btn-take-quiz" onclick="goNext()" style="background:var(--void-2);border:1px solid var(--wire);">GO TO NEXT LESSON →</button>`:''}`;
    document.getElementById('quiz-meta-hdr').textContent='NO QUIZ';
    return;
  }

  if(passed){
    el.innerHTML=`<div class="quiz-gate-msg passed">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      QUIZ PASSED — LESSON COMPLETE
    </div>
    ${hasNextVideo?`<button class="btn-take-quiz" onclick="goNext()">CONTINUE TO NEXT LESSON <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg></button>`:`<button class="btn-take-quiz" style="background:var(--green);color:#000;" onclick="window.location.href='dashboard.html'"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> COURSE COMPLETE — BACK TO DASHBOARD</button>`}`;
    return;
  }

  el.innerHTML=`<div class="quiz-gate-msg">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Complete the quiz below to unlock the next lesson. Pass score: ${video.passScore||70}%
  </div>
  <button class="btn-take-quiz" onclick="openQuiz()">
    START QUIZ — ${quiz.length} QUESTIONS
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>`;
}

function goNext(){
  const nextVideo=course.videos[videoIndex+1];
  if(nextVideo){
    sessionStorage.setItem('dflms_player',JSON.stringify({courseId:course.id,videoId:nextVideo.id}));
    window.location.reload();
  }
}

/* ── Quiz logic ── */
function openQuiz(){
  quizQuestions=video.quiz||[];
  currentQ=0;answers=[];quizAnswered=false;
  document.getElementById('quiz-overlay-title').textContent=video.title.toUpperCase();
  document.getElementById('quiz-overlay-meta').textContent=`[QUZ] ${quizQuestions.length} QUESTIONS · PASS: ${video.passScore||70}%`;
  renderQuestion();
  document.getElementById('quiz-overlay').classList.add('open');
}

function closeQuiz(){
  document.getElementById('quiz-overlay').classList.remove('open');
}

function renderQuestion(){
  const q=quizQuestions[currentQ];
  const pct=((currentQ)/quizQuestions.length*100);
  document.getElementById('quiz-prog-fill').style.width=pct+'%';
  document.getElementById('q-counter-nav').textContent=`Q ${currentQ+1} OF ${quizQuestions.length}`;
  document.getElementById('btn-next').disabled=true;
  document.getElementById('btn-next').innerHTML=(currentQ<quizQuestions.length-1?'NEXT →':'SUBMIT')+
    `<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>`;

  const optLetters=['A','B','C','D'];
  document.getElementById('quiz-body').innerHTML=`
    <div class="question-block active">
      <div class="q-counter">QUESTION ${currentQ+1} OF ${quizQuestions.length}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">
        ${q.options.map((opt,i)=>`
          <button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
            <span class="option-label">${optLetters[i]}</span>
            <span>${opt}</span>
          </button>`).join('')}
      </div>
    </div>`;
}

function selectAnswer(idx){
  if(answers[currentQ]!==undefined)return;
  answers[currentQ]=idx;
  const q=quizQuestions[currentQ];
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    if(i===q.correct)btn.classList.add('correct');
    else if(i===idx&&idx!==q.correct)btn.classList.add('wrong');
    btn.disabled=true;
  });
  document.getElementById('btn-next').disabled=false;
}

function nextQuestion(){
  if(answers[currentQ]===undefined)return;
  if(currentQ<quizQuestions.length-1){
    currentQ++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults(){
  const correct=answers.filter((a,i)=>a===quizQuestions[i].correct).length;
  const score=Math.round((correct/quizQuestions.length)*100);
  const passScore=video.passScore||70;
  const passed=score>=passScore;

  document.getElementById('quiz-prog-fill').style.width='100%';
  document.querySelector('.quiz-nav').style.display='none';

  if(passed)markQuizPassed(video.id,score);

  const hasNext=videoIndex<course.videos.length-1;

  document.getElementById('quiz-body').innerHTML=`
    <div class="quiz-result">
      <div class="result-score ${passed?'pass':'fail'}">${score}%</div>
      <div class="result-label ${passed?'pass':'fail'}">${passed?'// QUIZ PASSED':'// QUIZ FAILED'}</div>
      <p class="result-sub">${passed?`Well done. You scored ${score}% and have unlocked the next lesson.`:`You scored ${score}%. You need ${passScore}% to pass. Review the video and try again.`}</p>
      <div class="result-breakdown">
        <div class="rb-item"><div class="rb-num green">${correct}</div><div class="rb-label">Correct</div></div>
        <div class="rb-item"><div class="rb-num red">${quizQuestions.length-correct}</div><div class="rb-label">Wrong</div></div>
        <div class="rb-item"><div class="rb-num" style="color:var(--blue);">${score}%</div><div class="rb-label">Score</div></div>
      </div>
      ${passed&&hasNext?`<button class="btn-next-lesson" onclick="closeQuiz();goNext()">CONTINUE TO NEXT LESSON <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg></button>`:''}
      ${passed&&!hasNext?`<button class="btn-next-lesson" style="background:var(--green);color:#000;" onclick="closeQuiz();window.location.href='dashboard.html'"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> COURSE COMPLETE!</button>`:''}
      ${!passed?`<button class="btn-retry" onclick="openQuiz()"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> RETRY QUIZ</button>`:''}
      <button onclick="closeQuiz();renderQuizGate();renderPlaylist();" style="margin-top:10px;display:block;width:100%;max-width:280px;margin-left:auto;margin-right:auto;padding:12px;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-3);background:none;border:none;cursor:pointer;">BACK TO LESSON</button>
    </div>`;
}

init();
</script>
</body>
</html>
